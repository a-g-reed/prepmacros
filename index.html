    h+='<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #eadec5;">';
    h+='<div style="flex:1;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(c)+'</div>';
    h+='<button onclick="promptRenameCategory(\''+esc(c).replace(/\x27/g,'\\\x27')+'\')" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;">Rename</button>';
    h+='<button onclick="moveCategory(\''+esc(c).replace(/\x27/g,'\\\x27')+'\',-1)" '+(idx===0?'disabled':'')+' style="width:32px;height:32px;border-radius:8px;border:1px solid #d9c9a8;background:transparent;font-size:14px;cursor:pointer;opacity:'+(idx===0?0.3:1)+';">▲</button>';
    h+='<button onclick="moveCategory(\''+esc(c).replace(/\x27/g,'\\\x27')+'\',1)" '+(idx===cats.length-1?'disabled':'')+' style="width:32px;height:32px;border-radius:8px;border:1px solid #d9c9a8;background:transparent;font-size:14px;cursor:pointer;opacity:'+(idx===cats.length-1?0.3:1)+';">▼</button>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div style="margin-bottom:24px;">';
  h+='<div style="font-size:17px;font-weight:700;margin-bottom:2px;">Data Backup</div>';
  h+='<div style="font-size:12px;color:#8a7560;margin-bottom:12px;">Export your stock and history as JSON</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eadec5;">';
  h+='<div><div style="font-size:14px;">Export data</div><div style="font-size:12px;color:#8a7560;">Download JSON backup</div></div>';
  h+='<button onclick="exportData()" style="'+cs.btnSecondary+'padding:8px 14px;font-size:13px;">Export</button></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;">';
  h+='<div><div style="font-size:14px;">Import data</div><div style="font-size:12px;color:#8a7560;">Restore from backup</div></div>';
  h+='<label style="'+cs.btnSecondary+'padding:8px 14px;font-size:13px;cursor:pointer;">Import <input type="file" id="import-file" accept=".json" style="display:none;" onchange="handleImport(this)" /></label>';
  h+='</div></div>';
  return h;
}

    '<input id="'+id+'" type="number" inputmode="decimal" value="'+val+'" min="1" style="width:64px;padding:7px 10px;border-radius:8px;border:1px solid #d9c9a8;background:#ffffff;font-size:14px;color:#5c3d2e;text-align:center;-webkit-appearance:none;outline:none;" />'+
    '</div>';

function settingsTargetRow(label,id,val,placeholder){

    '<div style="font-size:14px;">'+label+'</div>'+
    '<input id="'+id+'" type="number" inputmode="decimal" value="'+val+'" placeholder="'+placeholder+'" min="0" style="width:96px;padding:7px 10px;border-radius:8px;border:1px solid #d9c9a8;background:#ffffff;font-size:14px;color:#5c3d2e;text-align:center;-webkit-appearance:none;outline:none;" />'+
    '</div>';
}

function handleImport(input){ if(input.files[0])importData(input.files[0]); }

// ── Modal
function renderModal(){
  var m=S.modal, it=m.item||null;
  var sheet='border-radius:20px 20px 0 0;padding:24px 24px calc(env(safe-area-inset-bottom) + 24px);width:100%;animation:slideUp 0.2s ease;background:#ffffff;';
  var overlay='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;animation:fadeIn 0.15s ease;';
  var h='<div style="'+overlay+'" onclick="if(event.target===this){S.modal=null;render();}">';

  if(m.type==='calendar'){
    var monthYM=S.calMonth||monthStr(todayStr());
    var nDays=daysInMonth(monthYM);
    var firstDow=firstDayOfWeek(monthYM);
    var t=todayStr();
    var sel=S.selectedDate||t;
    var mode=m.mode||'navigate';
    var titleText=mode==='copy-target'?'Copy to which day?':mode==='plan-target'?'Plan for which day?':'Jump to day';
    var subText=mode==='copy-target'?'Pick today or any future day':mode==='plan-target'?'Pick today or any future day':'Tap any day with activity';

    h+='<div style="'+sheet+'max-height:85vh;overflow-y:auto;">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">';
    h+='<div>';
    h+='<div class="pm-heading" style="font-size:22px;font-weight:600;letter-spacing:0.04em;">'+titleText+'</div>';
    h+='<div style="font-size:12px;color:#8a7560;margin-top:2px;">'+subText+'</div>';
    h+='</div>';
    h+='<button onclick="S.modal=null;render();" style="background:none;border:none;font-size:22px;color:#8a7560;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>';
    h+='</div>';

    // Month nav
    h+='<div style="display:flex;align-items:center;justify-content:space-between;background:#faf6ef;border:1px solid #d9c9a8;border-radius:10px;padding:6px;margin-bottom:14px;">';
    h+='<button onclick="S.calMonth=shiftMonth(S.calMonth,-1);render();" style="width:36px;height:36px;border-radius:8px;border:none;background:transparent;font-size:16px;cursor:pointer;color:#5c3d2e;">◀</button>';
    h+='<div class="pm-heading" style="font-size:16px;font-weight:600;letter-spacing:0.04em;color:#5c3d2e;">'+esc(fmtMonthLabel(monthYM))+'</div>';
    h+='<button onclick="S.calMonth=shiftMonth(S.calMonth,1);render();" style="width:36px;height:36px;border-radius:8px;border:none;background:transparent;font-size:16px;cursor:pointer;color:#5c3d2e;">▶</button>';
    h+='</div>';

    // Build a set of dates that have history, and dates with future eat/manual entries (planned)
    var histDates={};
    S.history.forEach(function(x){
      if(!x.date) return;
      var d=x.date.split('T')[0];
      if(d.indexOf(monthYM)===0) histDates[d]=true;
    });

    // Day-of-week header
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;">';
    ['S','M','T','W','T','F','S'].forEach(function(dow){
      h+='<div style="text-align:center;font-size:10px;font-weight:700;color:#8a7560;letter-spacing:0.5px;padding:4px 0;">'+dow+'</div>';
    });
    h+='</div>';

    // Date grid
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;">';
    // Leading empty cells
    for(var b=0;b<firstDow;b++) h+='<div></div>';
    for(var d=1; d<=nDays; d++){
      var dStr=monthYM+'-'+String(d).padStart(2,'0');
      var isFuture=dStr>t;
      var isToday2=dStr===t;
      var isSel=dStr===sel;
      var hasActivity=!!histDates[dStr];
      // Disable future dates in navigate mode unless they have activity (planned future entries)
      var disabled=(mode==='navigate' && isFuture && !hasActivity);
      // For copy-target / plan-target: disable past dates (only today + future allowed)
      if((mode==='copy-target'||mode==='plan-target') && dStr<t) disabled=true;
      var bg=isSel?'#5c3d2e':(isToday2?'#f5ecd9':'transparent');
      var color=isSel?'#faf6ef':(disabled?'#c8b89a':'#5c3d2e');
      var border=isToday2&&!isSel?'1px solid #c8922a':'1px solid transparent';
      var dotHtml=hasActivity&&!isSel?'<div style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:'+(isToday2?'#c8922a':'#5c3d2e')+';"></div>':'';
      if(disabled){
        h+='<div style="position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;color:'+color+';opacity:0.5;">'+d+'</div>';
      } else {
        h+='<button onclick="selectCalendarDate(\''+dStr+'\')" style="position:relative;aspect-ratio:1;border-radius:8px;border:'+border+';background:'+bg+';font-size:14px;font-weight:'+(isToday2||isSel?'700':'400')+';color:'+color+';cursor:pointer;padding:0;">'+d+dotHtml+'</button>';
      }
    }
    h+='</div>';

    // Quick "Today" button
    h+='<button onclick="selectCalendarDate(\''+t+'\')" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;margin-top:8px;">Jump to today</button>';
    h+='</div>';

  } else if(m.type==='confirm-copy'){
    var pc=pendingCopy||{hids:[],sourceLabel:'',kind:''};
    var count=pc.hids.length;
    var sourceIsToday=pc.sourceLabel==='Today';
    // For source=today, default destination is tomorrow. Otherwise it's today.
    var defaultDest=sourceIsToday?shiftDate(todayStr(),1):todayStr();
    var defaultDestLabel=fmtDateLabel(defaultDest);
    var destLabel=S.copyTargetDate?fmtDateLabel(S.copyTargetDate):defaultDestLabel.toLowerCase();
    h+='<div style="'+sheet+'">';
    h+='<div class="pm-heading" style="font-size:22px;font-weight:600;letter-spacing:0.04em;margin-bottom:4px;">Copy '+count+' entr'+(count===1?'y':'ies')+'?</div>';
    h+='<div style="color:#8a7560;font-size:13px;margin-bottom:18px;">From <strong>'+esc(pc.sourceLabel)+'</strong>. '+(sourceIsToday?'Future eat entries become plans you can confirm on the day.':'Eat entries will deduct from current stock where available.')+'</div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px;">';
    if(sourceIsToday){
      // Quick "Copy to tomorrow" + calendar
      h+='<button onclick="S.copyTargetDate=\''+defaultDest+'\';executePendingCopy();" style="'+cs.btnPrimary+'width:100%;">Copy to tomorrow</button>';
      h+='<button onclick="openCalendar(\'copy-target\');" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;">Choose a different day&hellip;</button>';
    } else {
      h+='<button onclick="executePendingCopy();" style="'+cs.btnPrimary+'width:100%;">Copy to today</button>';
      h+='<button onclick="openCalendar(\'copy-target\');" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;">Choose a different day&hellip;</button>';
    }
    h+='<button onclick="pendingCopy=null;S.modal=null;render();" style="'+cs.btnSecondary+'width:100%;">Cancel</button>';
    h+='</div></div>';

  } else if(m.type==='notifications'){
    var groups=getStockNotifications();
    var totalCount=groups.expired.length+groups.out.length+groups.low.length+groups.expiring.length+groups.forgotten.length;
    h+='<div style="'+sheet+'max-height:85vh;overflow-y:auto;">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">';
    h+='<div class="pm-heading" style="font-size:24px;font-weight:600;letter-spacing:0.04em;">Notifications</div>';
    h+='<button onclick="S.modal=null;render();" style="background:none;border:none;font-size:22px;color:#8a7560;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>';
    h+='</div>';

    if(totalCount===0){
      h+='<div style="text-align:center;padding:40px 20px;color:#8a7560;">';
      h+='<div style="font-size:40px;margin-bottom:10px;">✨</div>';
      h+='<div style="font-size:16px;font-weight:700;color:#5c3d2e;margin-bottom:4px;">All clear</div>';
      h+='<div style="font-size:13px;">Nothing low, out, or expiring</div>';
      h+='</div>';
    } else {
      // Render in severity order: Expired -> Out -> Low -> Expiring soon -> Forgotten
      var sections=[
        {key:'expired',label:'Expired',color:'#a84f2e',icon:'⚠️',entries:groups.expired},
        {key:'out',label:'Out of stock',color:'#a84f2e',icon:'❌',entries:groups.out},
        {key:'low',label:'Low stock',color:'#c8922a',icon:'⚡',entries:groups.low},
        {key:'expiring',label:'Expiring soon',color:'#c8922a',icon:'🕐',entries:groups.expiring},
        {key:'forgotten',label:'Forgotten',color:'#6b7c5e',icon:'💤',entries:groups.forgotten}
      ];
      sections.forEach(function(sec){
        if(!sec.entries.length) return;
        h+='<div style="margin-bottom:16px;">';
        h+='<div style="font-size:11px;font-weight:700;color:#8a7560;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">'+sec.icon+' '+sec.label+' ('+sec.entries.length+')</div>';
        h+='<div style="background:#faf6ef;border-radius:12px;border:1px solid #d9c9a8;padding:0 12px;">';
        sec.entries.forEach(function(n,i){
          var u=unitOf(n.item);
          var portionDisplay=n.item.portions+(u==='portions'?'':u);
          h+='<div onclick="jumpToItem(\''+n.item.id+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;'+(i<sec.entries.length-1?'border-bottom:1px solid #eadec5;':'')+'">';
          h+='<div style="flex:1;min-width:0;">';
          h+='<div style="font-size:14px;font-weight:700;color:#5c3d2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(n.item.name)+'</div>';
          h+='<div style="font-size:12px;color:'+sec.color+';">'+esc(n.detail)+'</div>';
          h+='</div>';
          h+='<div style="font-size:13px;color:#8a7560;flex-shrink:0;">›</div>';
          h+='</div>';
        });
        h+='</div></div>';
      });
    }
    h+='</div>';

  } else if(m.type==='log'){
    var n=S.logPortions;
    var u=unitOf(it);
    var unitTxt=u==='portions'?'':u;
    var availTxt=it.portions+unitTxt+' '+(u==='portions'?'portion'+(it.portions!==1?'s':''):'')+' available';
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">Log: '+esc(it.name)+'</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">'+availTxt+'</div>';
    h+=stepperHTML('logPortions',n,unitStep(u),it.portions,u,it);
    h+='<div id="macro-preview" style="margin-top:14px;">'+macroPreviewHTML(it,n)+'</div>';
    h+='<div style="display:flex;gap:10px;margin-top:16px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="logMeal();" style="'+cs.btnPrimary+'flex:1;">Log It</button>';
    h+='</div>';
    // Plan for later — opens calendar picker, creates a planned entry on the selected date (today + future allowed)
    h+='<button onclick="planMealForLater();" style="background:transparent;border:1px dashed #c8922a;color:#5c3d2e;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;margin-top:10px;">📅 Plan for later instead</button>';
    h+='</div>';

  } else if(m.type==='restock'){
    var rn=S.restockPortions;
    var u=unitOf(it);
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">Restock: '+esc(it.name)+'</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">Currently '+it.portions+(u==='portions'?'':u)+' remaining</div>';
    h+=stepperHTML('restockPortions',rn,unitStep(u),99999,u);
    h+='<div style="display:flex;gap:10px;margin-top:16px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="restockItem();" style="'+cs.btnPrimary+'flex:1;">Add Stock</button>';
    h+='</div></div>';

  } else if(m.type==='waste'){
    var wn=S.wastePortions;
    var u=unitOf(it);
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">Waste: '+esc(it.name)+'</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">'+it.portions+(u==='portions'?'':u)+' in stock</div>';
    h+=stepperHTML('wastePortions',wn,unitStep(u),it.portions,u);
    h+='<div style="display:flex;gap:10px;margin-top:16px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="wastePortions();" style="background:#b85c38;color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;flex:1;">Mark as Wasted</button>';
    h+='</div></div>';

  } else if(m.type==='confirm-remove'){
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">Remove item?</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:20px;">&quot;'+esc(it.name)+'&quot; will be removed entirely. This can\'t be undone.</div>';
    h+='<div style="display:flex;gap:10px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="removeItem(\''+it.id+'\');" style="background:#b85c38;color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;flex:1;">Remove</button>';
    h+='</div></div>';

  } else if(m.type==='log-after-prep'){
    var lpn=S.logPortions;
    var lpu=unitOf(it);
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">Log some as eaten?</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">Sampled some of &quot;'+esc(it.name)+'&quot; while prepping? Log it today.</div>';
    h+=stepperHTML('logPortions',lpn,unitStep(lpu),it.portions,lpu,it);
    h+='<div id="macro-preview" style="margin-top:14px;">'+macroPreviewHTML(it,lpn)+'</div>';
    h+='<div style="display:flex;gap:10px;margin-top:16px;">';
    h+='<button onclick="S.modal=null;S.logPortions=1;render();" style="'+cs.btnSecondary+'flex:1;">Skip</button>';
    h+='<button onclick="logMealAfterPrep();" style="'+cs.btnPrimary+'flex:1;">Log It</button>';
    h+='</div></div>';

  } else if(m.type==='confirm-archive'){
    var isArch=isArchived(it);
    var title=isArch?'Unarchive item?':'Archive item?';
    var body=isArch
      ? '&quot;'+esc(it.name)+'&quot; will return to your active stock and appear in alerts again.'
      : '&quot;'+esc(it.name)+'&quot; will be hidden from stock, alerts, and the log list. You can restore it from the archive any time.';
    var confirmLabel=isArch?'Unarchive':'Archive';
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">'+title+'</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:20px;">'+body+'</div>';
    h+='<div style="display:flex;gap:10px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="confirmArchive(\''+it.id+'\');" style="'+cs.btnPrimary+'flex:1;">'+confirmLabel+'</button>';
    h+='</div></div>';

  } else if(m.type==='edit-history'){
    var entry=m.entry;
    var hIt=S.items.filter(function(x){return x.id===entry.itemId;})[0];
    var hU=entry.unit||(hIt?unitOf(hIt):'portions');
    var hUSfx=hU==='portions'?'':hU;
    var typeLabel=entry.type==='eat'?'eaten':entry.type==='waste'?'wasted':'prepped';
    var titleIcon=entry.type==='eat'?'🍽':entry.type==='waste'?'🗑':'🥡';
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">'+titleIcon+' Edit: '+esc(entry.itemName)+'</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">Amount '+typeLabel+' — adjusts stock to match</div>';
    h+='<label style="'+cs.label+'">Amount</label>';
    h+='<div style="display:flex;align-items:baseline;gap:8px;">';
    h+='<input id="hist-amt" type="number" inputmode="decimal" value="'+entry.portions+'" min="0.1" step="'+(hU==='portions'?'1':'10')+'" oninput="S.histEditAmount=this.value" style="'+cs.input+'flex:1;font-size:20px;font-weight:700;" />';
    if(hUSfx) h+='<span style="font-size:16px;font-weight:700;color:#5c3d2e;">'+hUSfx+'</span>';
    h+='</div>';
    h+='<div style="display:flex;gap:10px;margin-top:20px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="saveHistoryEdit(\''+entry.hid+'\');" style="'+cs.btnPrimary+'flex:1;">Save</button>';
    h+='</div>';
    h+='<button onclick="deleteHistoryEntry(\''+entry.hid+'\');" style="background:transparent;border:1px dashed #b85c38;color:#b85c38;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;margin-top:12px;">Delete entry &amp; restore stock</button>';
    h+='</div>';

  } else if(m.type==='manual-entry'){
    var mf=S.manualForm||{label:'',cal:'',protein:'',carbs:'',fat:''};
    var isEdit=!!m.editingHid;
    h+='<div style="'+sheet+'max-height:85vh;overflow-y:auto;">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">✏️ '+(isEdit?'Edit manual entry':'Add manual entry')+'</div>';
    h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">For meals not tracked in your prep stock — breakfast, sides, drinks, etc.</div>';
    h+='<label style="'+cs.label+'">Label</label>';
    h+='<input id="mf-label" style="'+cs.input+'" value="'+esc(mf.label)+'" placeholder="e.g. Breakfast, Protein shake" oninput="S.manualForm.label=this.value" />';
    h+='<div style="font-size:14px;font-weight:700;margin:16px 0 2px;color:#5c3d2e;">Macros <span style="font-size:12px;color:#8a7560;font-weight:400;">(at least one required)</span></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    [['mf-cal','Calories','cal',mf.cal],['mf-protein','Protein (g)','protein',mf.protein],['mf-carbs','Carbs (g)','carbs',mf.carbs],['mf-fat','Fat (g)','fat',mf.fat]].forEach(function(x){
      h+='<div><label style="'+cs.label+'">'+x[1]+'</label><input id="'+x[0]+'" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(x[3])+'" placeholder="0" min="0" oninput="S.manualForm.'+x[2]+'=this.value" /></div>';
    });
    h+='</div>';
    h+='<div style="display:flex;gap:10px;margin-top:20px;">';
    h+='<button onclick="S.modal=null;S.manualForm=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="saveManualEntry();" style="'+cs.btnPrimary+'flex:1;">'+(isEdit?'Save Changes':'Add Entry')+'</button>';
    h+='</div>';
    if(!isEdit){
      h+='<button onclick="planManualEntryForLater();" style="background:transparent;border:1px dashed #c8922a;color:#5c3d2e;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;margin-top:10px;">📅 Plan for later instead</button>';
    }
    if(isEdit){
      h+='<button onclick="deleteManualEntry(\''+m.editingHid+'\');" style="background:transparent;border:1px dashed #b85c38;color:#b85c38;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;margin-top:12px;">Delete entry</button>';
    }
    h+='</div>';

  } else if(m.type==='edit'){
    var f=S.editForm;
    var u=f.unit||unitOf(it);
    var macroLbl=u==='portions'?'Macros per portion':'Macros per 100'+u;
    h+='<div style="'+sheet+'max-height:85vh;overflow-y:auto;">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:14px;">Edit: '+esc(it.name)+'</div>';
    h+='<label style="'+cs.label+'">Name</label><input id="e-name" style="'+cs.input+'" value="'+esc(f.name)+'" />';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    h+='<div><label style="'+cs.label+'">Category</label><select id="e-cat" style="'+cs.input+'">';
    CATS.filter(function(c){return c!=='All';}).forEach(function(c){h+='<option'+(f.category===c?' selected':'')+'>'+c+'</option>';});
    h+='</select></div>';
    h+='<div><label style="'+cs.label+'">Measured in</label><select id="e-unit" onchange="S.editForm.unit=this.value;collectEditForm();render();" style="'+cs.input+'">';
    [['portions','Portions'],['g','Grams (g)'],['ml','Millilitres (ml)']].forEach(function(opt){
      h+='<option value="'+opt[0]+'"'+(u===opt[0]?' selected':'')+'>'+opt[1]+'</option>';
    });
    h+='</select></div>';
    h+='</div>';
    h+='<label style="'+cs.label+'">Expires after (days)</label><input id="e-expiry" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(f.expiryDays)+'" placeholder="e.g. 5" min="1" />';
    h+='<div style="font-size:14px;font-weight:700;margin:16px 0 2px;color:#5c3d2e;">'+macroLbl+'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    [['e-cal','Calories',f.cal],['e-protein','Protein (g)',f.protein],['e-carbs','Carbs (g)',f.carbs],['e-fat','Fat (g)',f.fat]].forEach(function(m){
      h+='<div><label style="'+cs.label+'">'+m[1]+'</label><input id="'+m[0]+'" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(m[2])+'" placeholder="0" /></div>';
    });
    h+='</div>';
    h+='<label style="'+cs.label+'">Notes</label><input id="e-notes" style="'+cs.input+'" value="'+esc(f.notes)+'" placeholder="e.g. made with thighs" />';
    h+='<div style="display:flex;gap:10px;margin-top:20px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="collectAndSaveEdit();" style="'+cs.btnPrimary+'flex:1;">Save Changes</button>';
    h+='</div>';
    // Duplicate (handy for Creami bases and similar recipes with near-identical macros)
    h+='<button onclick="duplicateItem(\''+it.id+'\');" style="background:transparent;border:1px dashed #d9c9a8;color:#5c3d2e;border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;margin-top:16px;text-align:left;">';
    h+='<div style="font-weight:700;margin-bottom:2px;">📋 Duplicate item</div>';
    h+='<div style="font-size:11px;color:#8a7560;">Opens a prep session pre-filled with this item\'s details</div>';
    h+='</button>';
    // Archive / Unarchive (infrequent action, tucked under save button)
    var archLabel=isArchived(it)?'📤 Unarchive item':'📁 Archive item';
    var archSub=isArchived(it)?'Restore to your active stock':'Hide from stock and alerts (can be restored later)';
    h+='<button onclick="collectEditForm();openArchiveConfirm(\''+it.id+'\');" style="background:transparent;border:1px dashed #d9c9a8;color:#5c3d2e;border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;margin-top:10px;text-align:left;">';
    h+='<div style="font-weight:700;margin-bottom:2px;">'+archLabel+'</div>';
    h+='<div style="font-size:11px;color:#8a7560;">'+archSub+'</div>';
    h+='</button>';
    h+='</div>';
  }

  h+='</div>';
  return h;
}

function macroPreviewHTML(it,n){
  var m=macroFor(it,n);
  if(!m)return '';
  return '<div style="background:#f5ecd9;border-radius:8px;padding:10px 14px;font-size:13px;color:#5c3d2e;">~'+Math.round(m.cal)+' cal · '+Math.round(m.protein)+'g protein · '+Math.round(m.carbs)+'g carbs · '+Math.round(m.fat)+'g fat</div>';
}

function stepperHTML(field,val,step,max,unit,item){
  var suffix=unit&&unit!=='portions'?unit:'';
  var itemRef=item?',\''+item.id+'\'':'';
  return '<div style="display:flex;align-items:center;gap:16px;justify-content:center;">'+
    '<button onclick="stepperNudge(\''+field+'\','+(-step)+','+step+','+max+itemRef+')" style="width:44px;height:44px;border-radius:10px;border:1px solid #d9c9a8;background:transparent;font-size:22px;cursor:pointer;flex-shrink:0;">&minus;</button>'+
    '<div style="display:flex;align-items:baseline;">'+
      '<input type="number" inputmode="decimal" value="'+val+'" min="1" max="'+max+'" onfocus="this.select()" oninput="onStepperInput(\''+field+'\',this.value,'+max+itemRef+')" style="font-size:28px;font-weight:700;width:80px;text-align:center;border:none;background:transparent;color:#5c3d2e;-webkit-appearance:none;outline:none;padding:0;font-family:inherit;" />'+
      (suffix?'<span style="font-size:18px;font-weight:700;color:#5c3d2e;margin-left:2px;">'+suffix+'</span>':'')+
    '</div>'+
    '<button onclick="stepperNudge(\''+field+'\','+step+','+step+','+max+itemRef+')" style="width:44px;height:44px;border-radius:10px;border:1px solid #d9c9a8;background:transparent;font-size:22px;cursor:pointer;flex-shrink:0;">+</button>'+
    '</div>';
}

function stepperNudge(field, delta, step, max, itemId) {
  S[field] = Math.max(step, Math.min(max, S[field] + delta));
  render();
}

function onStepperInput(field, val, max, itemId) {
  var n = parseFloat(val);
  if (isNaN(n) || n < 1) return; // let user keep typing
  S[field] = Math.min(max, n);
  // If we have an item ref and there's a macro preview, update live without full re-render
  if (itemId) {
    var preview = ge('macro-preview');
    if (preview) {
      var it = S.items.filter(function(x){return x.id===itemId;})[0];
      if (it) preview.innerHTML = macroPreviewHTML(it, S[field]);
    }
  }
}

function collectEditForm(){
  if(!S.editForm)return;
  S.editForm.name=ge('e-name')?ge('e-name').value:S.editForm.name;
  S.editForm.category=ge('e-cat')?ge('e-cat').value:S.editForm.category;
  S.editForm.expiryDays=ge('e-expiry')?ge('e-expiry').value:S.editForm.expiryDays;
  S.editForm.cal=ge('e-cal')?ge('e-cal').value:S.editForm.cal;
  S.editForm.protein=ge('e-protein')?ge('e-protein').value:S.editForm.protein;
  S.editForm.carbs=ge('e-carbs')?ge('e-carbs').value:S.editForm.carbs;
  S.editForm.fat=ge('e-fat')?ge('e-fat').value:S.editForm.fat;
  S.editForm.notes=ge('e-notes')?ge('e-notes').value:S.editForm.notes;
}

function collectAndSaveEdit(){
  collectEditForm();
  saveEdit();
}

// ── Init ─────────────────────────────────────────────────────────────────────
localLoad();
S.syncStatus='syncing'; S.syncMsg='Loading\u2026';

fetch(SB_URL+'/rest/v1/prepmacros_data?id=eq.singleton',{
  headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
})
.then(function(res){return res.json();})
.then(function(data){
  if(data&&data.length>0){
    var r=data[0];
    S.items=r.items||[];
    S.history=r.history||[];
    if(r.settings)for(var k in r.settings)S.settings[k]=r.settings[k];
    S.dismissedAlerts=r.dismissed_alerts||{};
    localSave();
    S.syncStatus='synced'; S.syncMsg='Saved to cloud';
  } else {
    S.syncStatus='synced'; S.syncMsg='Ready';
  }
  render();
})
.catch(function(){
  S.syncStatus='error'; S.syncMsg='Offline \u2013 using local data';
  render();
});
</script>
