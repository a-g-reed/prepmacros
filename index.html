<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body { background: #f5efe6; margin: 0; font-family: sans-serif; padding: 20px; }
</style>
</head>
<body>
<div id="app">Step 0</div>
<script>
try {
  document.getElementById('app').innerHTML = 'Step 1';

  var CATS = ['All','Protein','Carbs','Veg','Snack','Dessert','Creami Base','Other'];
  document.getElementById('app').innerHTML = 'Step 2 - CATS ok';

  var DEFAULTS = { lowStockThreshold:3, expiryDays:5, forgottenDays:14 };
  document.getElementById('app').innerHTML = 'Step 3 - DEFAULTS ok';

  function objAssign(target, source) {
    for (var k in source) { if (source.hasOwnProperty(k)) target[k] = source[k]; }
    return target;
  }
  document.getElementById('app').innerHTML = 'Step 4 - objAssign ok';

  var S = {
    items:[], history:[], settings:objAssign({},DEFAULTS), dismissedAlerts:{},
    view:'stock', filterCat:'All', expandedId:null,
    modal:null, logPortions:1, restockPortions:'', wastePortions:1,
    editForm:null, syncStatus:'syncing', syncMsg:'Loading...',
    form:{ name:'',category:'Protein',portions:'',expiryDays:'',cal:'',protein:'',carbs:'',fat:'',notes:'' }
  };
  document.getElementById('app').innerHTML = 'Step 5 - S ok';

  var SB_URL = 'https://zbeuowizrnkotijtzoeh.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiZXVvd2l6cm5rb3RpanR6b2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODM4MDIsImV4cCI6MjA5MTg1OTgwMn0.c8_qca_JiWE0GAnuHW5RMtGgER7ywGO6rHifcCg1frI';
  document.getElementById('app').innerHTML = 'Step 6 - credentials ok';

  function sbGet(callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', SB_URL + '/rest/v1/prepmacros_data?id=eq.singleton', true);
    xhr.setRequestHeader('apikey', SB_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SB_KEY);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status >= 200 && xhr.status < 300) {
        try { callback(null, JSON.parse(xhr.responseText)); }
        catch(e) { callback('Parse error: ' + e.message); }
      } else {
        callback('HTTP ' + xhr.status);
      }
    };
    xhr.onerror = function() { callback('Network error'); };
    xhr.send();
  }
  document.getElementById('app').innerHTML = 'Step 7 - sbGet defined ok';

  sbGet(function(err, rows) {
    if (err) {
      document.getElementById('app').innerHTML = 'Step 8 - sbGet ERROR: ' + err;
    } else {
      document.getElementById('app').innerHTML = 'Step 8 - sbGet OK, rows: ' + rows.length;
    }
  });

} catch(e) {
  document.getElementById('app').innerHTML = 'CAUGHT ERROR: ' + e.message + ' (line ' + (e.lineNumber||'?') + ')';
}
</script>
</body>
</html>
