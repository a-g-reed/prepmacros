<script>
// ---- Supabase config ----
const SB_URL = 'https://zbeuowizrnkotijtzoeh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiZXVvd2l6cm5rb3RpanR6b2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODM4MDIsImV4cCI6MjA5MTg1OTgwMn0.c8_qca_JiWE0GAnuHW5RMtGgER7ywGO6rHifcCg1frI';
const SB_TABLE = 'prepmacros_data';
const SB_ROW = 'singleton';
const LOCAL_KEY = 'prepmacros-v2';

const CATS = [‘All’,‘Protein’,‘Carbs’,‘Veg’,‘Snack’,‘Dessert’,‘Creami Base’,‘Other’];
const DEFAULTS = { lowStockThreshold:3, expiryDays:5, forgottenDays:14 };

let S = {
items:[], history:[], settings:{…DEFAULTS}, dismissedAlerts:{},
view:‘stock’, filterCat:‘All’, expandedId:null,
modal:null, logPortions:1, restockPortions:’’, wastePortions:1,
editForm:null,
syncStatus:‘syncing’, // ‘syncing’ | ‘synced’ | ‘error’
form:{ name:’’,category:‘Protein’,portions:’’,expiryDays:’’,cal:’’,protein:’’,carbs:’’,fat:’’,notes:’’ }
};

// –– Supabase API ––
async function sbFetch(method, body) {
const url = `${SB_URL}/rest/v1/${SB_TABLE}?id=eq.${SB_ROW}`;
const res = await fetch(method === ‘GET’ ? url : url, {
method,
headers: {
‘apikey’: SB_KEY,
‘Authorization’: `Bearer ${SB_KEY}`,
‘Content-Type’: ‘application/json’,
‘Prefer’: method === ‘PATCH’ ? ‘return=minimal’ : ‘return=representation’
},
body: body ? JSON.stringify(body) : undefined
});
if (!res.ok) throw new Error(`Supabase ${method} failed: ${res.status}`);
if (method === ‘GET’) return res.json();
return null;
}

async function cloudLoad() {
try {
const rows = await sbFetch(‘GET’);
if (rows && rows.length > 0) {
const r = rows[0];
S.items = r.items || [];
S.history = r.history || [];
S.settings = { …DEFAULTS, …(r.settings || {}) };
S.dismissedAlerts = r.dismissed_alerts || {};
localSave();
} else {
S._debugMsg = ‘Supabase returned empty rows — table may be empty’;
}
} catch(e) {
S._debugMsg = ’cloudLoad error: ’ + e.message;
throw e;
}
}

async function cloudSave() {
try {
await sbFetch(‘PATCH’, {
items: S.items,
history: S.history,
settings: S.settings,
dismissed_alerts: S.dismissedAlerts,
updated_at: new Date().toISOString()
});
S._debugMsg = null;
} catch(e) {
S._debugMsg = ’cloudSave error: ’ + e.message;
throw e;
}
}

// –– Local cache ––
function localSave() {
try { localStorage.setItem(LOCAL_KEY, JSON.stringify({ items:S.items, history:S.history, settings:S.settings, dismissedAlerts:S.dismissedAlerts })); } catch(e){}
}
function localLoad() {
try { const r=localStorage.getItem(LOCAL_KEY); if(r){ const p=JSON.parse(r); S.items=p.items||[]; S.history=p.history||[]; S.settings={…DEFAULTS,…(p.settings||{})}; S.dismissedAlerts=p.dismissedAlerts||{}; } } catch(e){}
}

// Save to local immediately, sync to cloud async
let saveTimer = null;
function save() {
localSave();
S.syncStatus = ‘syncing’;
clearTimeout(saveTimer);
saveTimer = setTimeout(async () => {
try {
await cloudSave();
S.syncStatus = ‘synced’;
} catch(e) {
S.syncStatus = ‘error’;
}
// re-render just the sync bar without full re-render
const bar = document.getElementById(‘sync-bar’);
if (bar) {
bar.className = `sync-bar ${S.syncStatus}`;
bar.innerHTML = syncBarHTML();
}
}, 800); // debounce — waits 800ms after last change before syncing
}

// –– Init ––
async function init() {
// Show loading screen
document.getElementById(‘app’).innerHTML = ` <div class="loading-screen"> <div class="spinner"></div> <div class="loading-title">PrepMacros</div> <div class="loading-sub">Loading your stock…</div> </div>`;

// Load local cache first for instant feel
localLoad();

// Then fetch from cloud
try {
await cloudLoad();
S.syncStatus = ‘synced’;
} catch(e) {
S.syncStatus = ‘error’;
if (!S._debugMsg) S._debugMsg = ’Init error: ’ + e.message;
}

// Always render regardless of sync outcome
try {
render();
} catch(e) {
document.getElementById(‘app’).innerHTML = ` <div class="loading-screen"> <div class="loading-title">PrepMacros</div> <div class="loading-sub" style="color:#b85c38">Render error: ${e.message}</div> </div>`;
}
}

// –– Helpers ––
function daysSince(d) { if(!d)return null; return Math.floor((Date.now()-new Date(d))/86400000); }
function daysAgo(d) { const n=daysSince(d); if(n===null)return null; if(n===0)return’today’; if(n===1)return’yesterday’; return n+‘d ago’; }
function todayStr() { return new Date().toISOString().split(‘T’)[0]; }
function barColor(p) { return p>0.5?’#7a9e7e’:p>0.25?’#c4a84b’:’#b85c38’; }

function todayMacros() {
const t=todayStr(); let cal=0,pro=0,carb=0,fat=0,any=false;
S.history.filter(h=>h.type===‘eat’&&h.date?.startsWith(t)).forEach(h=>{
const it=S.items.find(x=>x.id===h.itemId);
if(it?.macros?.cal){ cal+=parseFloat(it.macros.cal)*h.portions; pro+=parseFloat(it.macros.protein||0)*h.portions; carb+=parseFloat(it.macros.carbs||0)*h.portions; fat+=parseFloat(it.macros.fat||0)*h.portions; any=true; }
});
return any?{cal:Math.round(cal),protein:Math.round(pro),carbs:Math.round(carb),fat:Math.round(fat)}:null;
}

function isDismissedToday(key) { return S.dismissedAlerts[key]===todayStr(); }

function getAlerts() {
const alerts=[];
S.items.forEach(it=>{
if(it.portions===0) return;
const expDays=it.expiryDays!=null?it.expiryDays:S.settings.expiryDays;
const age=daysSince(it.prepDate);
if(expDays&&age!==null){
if(age>=expDays&&!isDismissedToday(`exp-${it.id}`))
alerts.push({key:`exp-${it.id}`,type:‘expired’,item:it,msg:`${it.name} may have expired`,badge:`${age}d old`,col:’#b85c38’});
else if(age>=expDays-1&&age<expDays&&!isDismissedToday(`expw-${it.id}`))
alerts.push({key:`expw-${it.id}`,type:‘expiring’,item:it,msg:`${it.name} expires tomorrow`,badge:‘1d left’,col:’#c4a84b’});
}
const lastRef=it.lastEaten||it.prepDate;
const sinceEat=daysSince(lastRef);
if(sinceEat!==null&&sinceEat>=S.settings.forgottenDays&&!isDismissedToday(`fgt-${it.id}`))
alerts.push({key:`fgt-${it.id}`,type:‘forgotten’,item:it,msg:`Haven't eaten ${it.name}`,badge:`${sinceEat}d`,col:’#6050a0’});
});
return alerts;
}

function dismissAlert(key) { S.dismissedAlerts[key]=todayStr(); save(); render(); }
function totP() { return S.items.reduce((s,it)=>s+it.portions,0); }
function lowC() { return S.items.filter(it=>it.portions>0&&it.portions<=S.settings.lowStockThreshold).length; }
function outC() { return S.items.filter(it=>it.portions===0).length; }

// –– Actions ––
function addItem() {
const f=S.form;
if(!f.name.trim()||!f.portions) return;
const item={id:Date.now().toString(),name:f.name.trim(),category:f.category,portions:parseInt(f.portions),totalPortions:parseInt(f.portions),
expiryDays:f.expiryDays?parseInt(f.expiryDays):null,
macros:{cal:f.cal,protein:f.protein,carbs:f.carbs,fat:f.fat},notes:f.notes,prepDate:new Date().toISOString(),lastEaten:null};
S.items.push(item);
S.history.unshift({type:‘prep’,itemId:item.id,itemName:item.name,portions:item.portions,date:new Date().toISOString()});
save(); S.form={name:’’,category:‘Protein’,portions:’’,expiryDays:’’,cal:’’,protein:’’,carbs:’’,fat:’’,notes:’’}; S.view=‘stock’; render();
}

function restockItem() {
const n=parseInt(S.restockPortions); if(!n||!S.modal) return;
const id=S.modal.item.id;
S.items=S.items.map(it=>it.id===id?{…it,portions:it.portions+n,totalPortions:it.totalPortions+n,prepDate:new Date().toISOString()}:it);
S.history.unshift({type:‘prep’,itemId:id,itemName:S.modal.item.name,portions:n,date:new Date().toISOString()});
[‘exp’,‘expw’,‘fgt’].forEach(p=>delete S.dismissedAlerts[`${p}-${id}`]);
save(); S.modal=null; S.restockPortions=’’; render();
}

function logMeal() {
if(!S.modal) return;
const n=Math.min(S.logPortions,S.modal.item.portions); const id=S.modal.item.id;
S.items=S.items.map(it=>it.id===id?{…it,portions:Math.max(0,it.portions-n),lastEaten:new Date().toISOString()}:it);
S.history.unshift({type:‘eat’,itemId:id,itemName:S.modal.item.name,portions:n,date:new Date().toISOString()});
delete S.dismissedAlerts[`fgt-${id}`];
save(); S.modal=null; S.logPortions=1; render();
}

function removeItem(id) {
const it=S.items.find(x=>x.id===id);
if(it) S.history.unshift({type:‘deleted’,itemId:id,itemName:it.name,portions:it.portions,date:new Date().toISOString()});
S.items=S.items.filter(x=>x.id!==id); S.modal=null; save(); render();
}

function openEdit(id) {
const it=S.items.find(x=>x.id===id); if(!it) return;
S.editForm={id,name:it.name,category:it.category,expiryDays:it.expiryDays||’’,
cal:it.macros?.cal||’’,protein:it.macros?.protein||’’,carbs:it.macros?.carbs||’’,fat:it.macros?.fat||’’,notes:it.notes||’’};
S.modal={type:‘edit’,item:it}; render();
}

function saveEdit() {
const f=S.editForm; if(!f) return;
S.items=S.items.map(it=>it.id===f.id?{…it,
name:f.name.trim()||it.name,category:f.category,
expiryDays:f.expiryDays?parseInt(f.expiryDays):null,
macros:{cal:f.cal,protein:f.protein,carbs:f.carbs,fat:f.fat},
notes:f.notes
}:it);
save(); S.modal=null; S.editForm=null; render();
}

function wastePortions() {
if(!S.modal) return;
const n=Math.min(S.wastePortions,S.modal.item.portions); const id=S.modal.item.id;
const wasAll=S.modal.item.portions-n<=0;
S.items=S.items.map(it=>it.id===id?{…it,portions:Math.max(0,it.portions-n)}:it);
S.history.unshift({type:‘waste’,itemId:id,itemName:S.modal.item.name,portions:n,date:new Date().toISOString()});
if(wasAll) S.items=S.items.filter(it=>it.id!==id);
save(); S.modal=null; S.wastePortions=1; render();
}

function saveSettings() {
const g=(id,fb)=>{const e=document.getElementById(id); return e?parseInt(e.value)||fb:fb;};
S.settings.lowStockThreshold=g(‘s-low’,3); S.settings.expiryDays=g(‘s-exp’,5); S.settings.forgottenDays=g(‘s-fgt’,14);
save(); render();
}

function exportData() {
const blob=new Blob([JSON.stringify({items:S.items,history:S.history,settings:S.settings},null,2)],{type:‘application/json’});
const a=document.createElement(‘a’); a.href=URL.createObjectURL(blob); a.download=`prepmacros-${todayStr()}.json`; a.click();
}

function importData(file) {
const r=new FileReader(); r.onload=e=>{
try{ const p=JSON.parse(e.target.result);
if(p.items){S.items=p.items;S.history=p.history||[];S.settings={…DEFAULTS,…(p.settings||{})};save();render();alert(‘Import successful!’);}
else alert(‘Invalid file.’);
}catch{alert(‘Could not read file.’);}
}; r.readAsText(file);
}

return `<div class="sync-dot"></div><span style="word-break:break-all">${msg}</span>`;
}

function renderCard(it) {
const pct=it.totalPortions>0?it.portions/it.totalPortions:0;

const expDays=it.expiryDays!=null?it.expiryDays:S.settings.expiryDays;
const age=daysSince(it.prepDate);
const isExp=expDays&&age>=expDays,isExpW=!isExp&&expDays&&age>=expDays-1;
const sinceEat=daysSince(it.lastEaten||it.prepDate),isFgt=sinceEat>=S.settings.forgottenDays;
const cardCls=‘item-card’+(isExp?’ card-expired’:isExpW||isLow?’ card-warn’:’’);
const portCol=oos?’#b85c38’:isLow?’#c4a84b’:’#3d2b1a’;
return `<div class="${cardCls}"> <div class="item-card-header" data-expand="${it.id}"> <div class="item-card-row"> <div style="flex:1;min-width:0"> <div class="item-name">${it.name}</div> <div class="item-meta"> <span class="item-tag tag-default">${it.category}</span> ${isExp?`<span class="item-tag tag-danger">⚠️ Expired</span>`:isExpW?`<span class="item-tag tag-warn">🕐 Exp. soon</span>`:`<span>prepped ${daysAgo(it.prepDate)||’—’}</span>`} ${isLow&&!oos?`<span class="item-tag tag-warn">⚡ Low</span>`:''} ${isFgt&&!oos?`<span class="item-tag tag-forgotten">💤 Forgotten</span>`:''} ${it.lastEaten?`<span>eaten ${daysAgo(it.lastEaten)}</span>`:''} </div> </div> <div class="item-portions"><div class="item-portions-num" style="color:${portCol}">${it.portions}</div><div class="item-portions-lbl">portions</div></div> </div> <div class="progress-track"><div class="progress-bar" style="width:${Math.max(2,pct*100)}%;background:${barColor(pct)}"></div></div> </div> ${exp?`<div class="item-details">
${it.macros?.cal?`<div class="macro-grid"> <div class="macro-cell"><div class="macro-val">${it.macros.cal}</div><div class="macro-lbl">Cal</div></div> <div class="macro-cell"><div class="macro-val">${it.macros.protein}g</div><div class="macro-lbl">Protein</div></div> <div class="macro-cell"><div class="macro-val">${it.macros.carbs}g</div><div class="macro-lbl">Carbs</div></div> <div class="macro-cell"><div class="macro-val">${it.macros.fat}g</div><div class="macro-lbl">Fat</div></div> </div>`:’’}
${it.notes?`<div class="item-notes">"${it.notes}"</div>`:’’}
${expDays?`<div class="expiry-line">Expiry window: ${expDays} days · ${isExp?'<span style="color:#b85c38;font-weight:700">Expired</span>':`${expDays-age}d remaining`}</div>`:’’}
<div class="action-row">
<button class=“btn-primary btn-flex btn-sm” data-log=”${it.id}” ${oos?‘disabled’:’’}>🍽 Eat</button>
<button class="btn-secondary btn-flex btn-sm" data-restock="${it.id}">🥡 Restock</button>
<button class=“btn-secondary btn-flex btn-sm” data-waste=”${it.id}” ${oos?‘disabled’:’’}>🗑 Waste</button>
<button class="btn-secondary btn-sm" style="padding:8px 10px" data-edit="${it.id}">✏️</button>
<button class="btn-secondary btn-danger btn-sm" style="padding:8px 10px" data-confirm-remove="${it.id}">✕</button>
</div>
</div>`:’’}

  </div>`;
}

function renderHistory() {
const today=todayStr(),grouped={};
S.history.slice(0,100).forEach(h=>{
const d=h.date?h.date.split(‘T’)[0]:‘unknown’;
if(!grouped[d]) grouped[d]=[];
grouped[d].push(h);
});
const days=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
return `<div class="page-title">Activity History</div> ${!S.history.length?'<div style="text-align:center;padding:40px;color:#a08060">No activity yet</div>' :days.map(day=>{ const label=day===today?'Today':daysAgo(day+'T12:00:00')||day; let dc=0,dp=0,dany=false; grouped[day].filter(h=>h.type==='eat').forEach(h=>{ const it=S.items.find(x=>x.id===h.itemId); if(it?.macros?.cal){dc+=parseFloat(it.macros.cal)*h.portions;dp+=parseFloat(it.macros.protein||0)*h.portions;dany=true;} }); return `<div class="history-day-header"><div class="history-day-label">${label}</div>${dany?`<div class="history-day-macros">${Math.round(dc)} cal · ${Math.round(dp)}g pro</div>`:’’}</div>
<div style="background:var(--cream-card);border-radius:12px;border:1px solid var(--border);padding:0 14px;margin-bottom:12px">
${grouped[day].map(h=>`<div class="history-row"> <div class="history-icon">${h.type==='eat'?'🍽':h.type==='waste'?'🗑':h.type==='deleted'?'❌':'🥡'}</div> <div style="flex:1"><div class="history-name">${h.itemName}</div> <div class="history-meta">${h.type==='eat'?`Ate ${h.portions} portion${h.portions>1?‘s’:’’}`:h.type==='waste'?`Wasted ${h.portions} portion${h.portions>1?‘s’:’’}`:h.type==='deleted'?'Removed from stock':`Prepped ${h.portions} portions`}</div></div> </div>`).join(’’)}</div>`; }).join('')}`;
}

function attachEvents() {
const on=(sel,ev,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn));
on(’[data-nav]’,‘click’,e=>{ S.view=e.currentTarget.dataset.nav; render(); });
on(’[data-filter]’,‘click’,e=>{ S.filterCat=e.currentTarget.dataset.filter; render(); });
on(’[data-expand]’,‘click’,e=>{ S.expandedId=S.expandedId===e.currentTarget.dataset.expand?null:e.currentTarget.dataset.expand; render(); });
on(’[data-log]’,‘click’,e=>{ e.stopPropagation(); const it=S.items.find(x=>x.id===e.currentTarget.dataset.log); if(it&&it.portions>0){S.modal={type:‘log’,item:it};S.logPortions=1;render();} });
on(’[data-restock]’,‘click’,e=>{ e.stopPropagation(); const it=S.items.find(x=>x.id===e.currentTarget.dataset.restock); if(it){S.modal={type:‘restock’,item:it};S.restockPortions=’’;render();} });
on(’[data-waste]’,‘click’,e=>{ e.stopPropagation(); const it=S.items.find(x=>x.id===e.currentTarget.dataset.waste); if(it&&it.portions>0){S.modal={type:‘waste’,item:it};S.wastePortions=1;render();} });
on(’[data-edit]’,‘click’,e=>{ e.stopPropagation(); openEdit(e.currentTarget.dataset.edit); });
on(’[data-confirm-remove]’,‘click’,e=>{ e.stopPropagation(); const it=S.items.find(x=>x.id===e.currentTarget.dataset.confirmRemove); if(it){S.modal={type:‘confirm-remove’,item:it};render();} });
on(’[data-dismiss]’,‘click’,e=>{ e.stopPropagation(); dismissAlert(e.currentTarget.dataset.dismiss); });

const btnAdd=document.getElementById(‘btn-add-item’);
if(btnAdd) btnAdd.addEventListener(‘click’,()=>{
const g=id=>document.getElementById(id)?.value||’’;
S.form={name:g(‘f-name’),category:g(‘f-cat’)||‘Protein’,portions:g(‘f-portions’),expiryDays:g(‘f-expiry’),
cal:g(‘f-cal’),protein:g(‘f-protein’),carbs:g(‘f-carbs’),fat:g(‘f-fat’),notes:g(‘f-notes’)};
addItem();
});

const btnSave=document.getElementById(‘btn-save-settings’);
if(btnSave) btnSave.addEventListener(‘click’,saveSettings);
const btnExp=document.getElementById(‘btn-export’);
if(btnExp) btnExp.addEventListener(‘click’,exportData);
const btnImp=document.getElementById(‘btn-import’);
if(btnImp) btnImp.addEventListener(‘change’,e=>{ if(e.target.files[0]) importData(e.target.files[0]); });

const cancel=document.getElementById(‘modal-cancel’);
if(cancel) cancel.addEventListener(‘click’,()=>{ S.modal=null; render(); });
const overlay=document.getElementById(‘modal-overlay’);
if(overlay) overlay.addEventListener(‘click’,e=>{ if(e.target===overlay){S.modal=null;render();} });

const conf=document.getElementById(‘modal-confirm’);
if(conf) conf.addEventListener(‘click’,()=>{
if(S.modal?.type===‘log’) logMeal();
else if(S.modal?.type===‘restock’){ S.restockPortions=document.getElementById(‘restock-input’)?.value||’’; restockItem(); }
else if(S.modal?.type===‘waste’) wastePortions();
else if(S.modal?.type===‘confirm-remove’) removeItem(S.modal.item.id);
else if(S.modal?.type===‘edit’){
const g=id=>document.getElementById(id)?.value||’’;
S.editForm={…S.editForm,name:g(‘e-name’),category:g(‘e-cat’),expiryDays:g(‘e-expiry’),
cal:g(‘e-cal’),protein:g(‘e-protein’),carbs:g(‘e-carbs’),fat:g(‘e-fat’),notes:g(‘e-notes’)};
saveEdit();
}
});

const sd=document.getElementById(‘step-down’);
if(sd) sd.addEventListener(‘click’,()=>{ if(S.modal?.type===‘waste’) S.wastePortions=Math.max(1,S.wastePortions-1); else S.logPortions=Math.max(1,S.logPortions-1); render(); });
const su=document.getElementById(‘step-up’);
if(su) su.addEventListener(‘click’,()=>{ if(S.modal?.type===‘waste’) S.wastePortions=Math.min(S.modal?.item?.portions||1,S.wastePortions+1); else S.logPortions=Math.min(S.modal?.item?.portions||1,S.logPortions+1); render(); });
}

init();
</script>

</body>
</html>
