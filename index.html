// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function daysSince(d){ if(!d)return null; return Math.floor((Date.now()-new Date(d))/86400000); }
function daysAgo(d){ var n=daysSince(d); if(n===null)return null; if(n===0)return'today'; if(n===1)return'yesterday'; return n+'d ago'; }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function shiftDate(dateStr, days){
  var d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function fmtDateLabel(dateStr){
  if(dateStr===todayStr()) return 'Today';
  var t=todayStr();
  var yest=shiftDate(t,-1);
  var tom=shiftDate(t,1);
  if(dateStr===yest) return 'Yesterday';
  if(dateStr===tom) return 'Tomorrow';
  var d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
}
function monthStr(dateStr){
  // Returns 'YYYY-MM' from a 'YYYY-MM-DD' string
  return dateStr.slice(0,7);
}
function shiftMonth(monthYM, deltaMonths){
  var parts=monthYM.split('-');
  var y=parseInt(parts[0],10), m=parseInt(parts[1],10)-1;
  m+=deltaMonths;
  while(m<0){m+=12;y--;}
  while(m>11){m-=12;y++;}
  return y+'-'+String(m+1).padStart(2,'0');
}
function fmtMonthLabel(monthYM){
  var d=new Date(monthYM+'-01T12:00:00');
  return d.toLocaleDateString(undefined,{month:'long',year:'numeric'});
}
function daysInMonth(monthYM){
  var parts=monthYM.split('-');
  var y=parseInt(parts[0],10), m=parseInt(parts[1],10);
  return new Date(y,m,0).getDate(); // m here is 1-indexed; new Date(y, m, 0) = last day of month m
}
// Returns 0..6 for the day of week of YYYY-MM-01 (0=Sunday)
function firstDayOfWeek(monthYM){
  return new Date(monthYM+'-01T12:00:00').getDay();
}
function barColor(p){ return p>0.5?'#6b7c5e':p>0.25?'#c4a84b':'#b85c38'; }
function isDismissedToday(k){ return S.dismissedAlerts[k]===todayStr(); }
function isArchived(it){ return !!it.archived; }
function activeItems(){ return S.items.filter(function(it){return !isArchived(it);}); }
function totP(){ return activeItems().reduce(function(s,it){return s+it.portions;},0); }
function lowC(){ return activeItems().filter(function(it){return it.portions>0&&it.portions<=S.settings.lowStockThreshold;}).length; }
function outC(){ return activeItems().filter(function(it){return it.portions===0;}).length; }
function archivedC(){ return S.items.filter(isArchived).length; }
function ge(id){ return document.getElementById(id); }
function newHid(){ return 'h'+Date.now()+Math.random().toString(36).slice(2,7); }
function hasTargets(){ return S.settings.targetCal>0||S.settings.targetProtein>0||S.settings.targetCarbs>0||S.settings.targetFat>0; }

// Render a small circular progress ring (SVG). pct is 0..1+, colour is hex.
function progressRing(pct,color,size,strokeWidth){
  size=size||28; strokeWidth=strokeWidth||3;
  var r=(size-strokeWidth)/2;
  var cx=size/2, cy=size/2;
  var circ=2*Math.PI*r;
  var clamped=Math.min(1,Math.max(0,pct));
  var offset=circ*(1-clamped);
  var bgOpacity=0.2;
  return '<svg width="'+size+'" height="'+size+'" style="display:block;transform:rotate(-90deg);">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke="'+color+'" stroke-opacity="'+bgOpacity+'" stroke-width="'+strokeWidth+'" fill="none"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke="'+color+'" stroke-width="'+strokeWidth+'" fill="none" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/>'+
    '</svg>';
}

// Horizontal progress bar (thin, for detailed view)
function progressBar(pct,color,bgColor){
  var clamped=Math.min(1,Math.max(0,pct));
  var over=pct>1;
  // If over target, cap bar at 100% width but use warmer colour
  return '<div style="width:100%;height:8px;background:'+(bgColor||'#eadec5')+';border-radius:4px;overflow:hidden;">'+
    '<div style="width:'+(clamped*100)+'%;height:100%;background:'+(over?'#e0a030':color)+';border-radius:4px;transition:width 0.3s;"></div>'+
    '</div>';
}

// Unit helpers
function unitOf(it){ return it.unit||'portions'; }
function unitLabel(u,n){ if(u==='g')return 'g'; if(u==='ml')return 'ml'; return n===1?'portion':'portions'; }
function unitStep(u){ return u==='portions'?1:10; }
function fmtAmount(n,u){ return n+(u==='portions'?'':u); }
// Calculate macros consumed for n units of item
function macroFor(it,n){
  if(!it.macros||!it.macros.cal)return null;
  var u=unitOf(it);
  // For portions: macros are per-portion, just multiply
  // For g/ml: macros are per-100g/100ml, divide by 100 then multiply
  var divisor=u==='portions'?1:100;
  return {
    cal: parseFloat(it.macros.cal)*n/divisor,
    protein: parseFloat(it.macros.protein||0)*n/divisor,
    carbs: parseFloat(it.macros.carbs||0)*n/divisor,
    fat: parseFloat(it.macros.fat||0)*n/divisor
  };
}

function todayMacros(){
  var t=todayStr(); var cal=0,pro=0,carb=0,fat=0,any=false;
  // Eat entries from stock items
  S.history.filter(function(h){return h.type==='eat'&&h.date&&h.date.indexOf(t)===0;}).forEach(function(h){
    var it=S.items.filter(function(x){return x.id===h.itemId;})[0];
    if(!it)return;
    var m=macroFor(it,h.portions);
    if(m){cal+=m.cal;pro+=m.protein;carb+=m.carbs;fat+=m.fat;any=true;}
  });
  // Manual entries
  S.history.filter(function(h){return h.type==='manual'&&h.date&&h.date.indexOf(t)===0;}).forEach(function(h){
    cal+=parseFloat(h.cal||0);
    pro+=parseFloat(h.protein||0);
    carb+=parseFloat(h.carbs||0);
    fat+=parseFloat(h.fat||0);
    any=true;
  });
  return any?{cal:Math.round(cal),protein:Math.round(pro),carbs:Math.round(carb),fat:Math.round(fat)}:null;
}

function getAlerts(){
  var alerts=[];
  S.items.forEach(function(it){
    if(it.portions===0||isArchived(it))return;
    var expDays=it.expiryDays!=null?it.expiryDays:S.settings.expiryDays;
    var age=daysSince(it.prepDate);
    if(expDays&&age!==null){
      if(age>=expDays&&!isDismissedToday('exp-'+it.id)) alerts.push({key:'exp-'+it.id,type:'expired',item:it,msg:esc(it.name)+' may have expired',badge:age+'d old',col:'#b85c38'});
      else if(age>=expDays-1&&age<expDays&&!isDismissedToday('expw-'+it.id)) alerts.push({key:'expw-'+it.id,type:'expiring',item:it,msg:esc(it.name)+' expires tomorrow',badge:'1d left',col:'#c4a84b'});
    }
    var sinceEat=daysSince(it.lastEaten||it.prepDate);
    if(sinceEat!==null&&sinceEat>=S.settings.forgottenDays&&!isDismissedToday('fgt-'+it.id))
      alerts.push({key:'fgt-'+it.id,type:'forgotten',item:it,msg:"Haven't eaten "+esc(it.name),badge:sinceEat+'d',col:'#6050a0'});
  });
  return alerts;
}

// ── Stock notifications (bell): Low / Out / Expired / Expiring soon / Forgotten
// Returns grouped, sorted by severity. Each entry has a stable key so we can
// track which ones the user has already seen.
function getStockNotifications(){
  var groups={expired:[],out:[],low:[],expiring:[],forgotten:[]};
  S.items.forEach(function(it){
    if(isArchived(it))return;
    // Out
    if(it.portions===0){
      groups.out.push({key:'out-'+it.id,type:'out',item:it,detail:'Out of stock'});
      return; // don't compound out with low/expired
    }
    // Expired / expiring
    var expDays=it.expiryDays!=null?it.expiryDays:S.settings.expiryDays;
    var age=daysSince(it.prepDate);
    if(expDays&&age!==null){
      if(age>=expDays){
        groups.expired.push({key:'exp-'+it.id,type:'expired',item:it,detail:'Expired '+(age-expDays===0?'today':(age-expDays)+'d ago')});
      } else if(age>=expDays-1){
        groups.expiring.push({key:'expw-'+it.id,type:'expiring',item:it,detail:'Expires soon'});
      }
    }
    // Low (only if not already expired)
    if(it.portions>0 && it.portions<=S.settings.lowStockThreshold){
      var alreadyFlagged=groups.expired.filter(function(g){return g.item.id===it.id;}).length>0;
      if(!alreadyFlagged) groups.low.push({key:'low-'+it.id,type:'low',item:it,detail:it.portions+' '+(unitOf(it)==='portions'?'portion'+(it.portions!==1?'s':''):unitOf(it))+' left'});
    }
    // Forgotten
    var sinceEat=daysSince(it.lastEaten||it.prepDate);
    if(sinceEat!==null && sinceEat>=S.settings.forgottenDays){
      groups.forgotten.push({key:'fgt-'+it.id,type:'forgotten',item:it,detail:"Haven't eaten in "+sinceEat+' days'});
    }
  });
  return groups;
}

function allNotificationKeys(){
  var groups=getStockNotifications();
  var keys=[];
  ['expired','out','low','expiring','forgotten'].forEach(function(g){
    groups[g].forEach(function(n){ keys.push(n.key); });
  });
  return keys;
}

function hasUnseenNotifications(){
  var seen=S.settings.seenAlerts||{};
  var keys=allNotificationKeys();
  for(var i=0;i<keys.length;i++){ if(!seen[keys[i]]) return true; }
  return false;
}

function markAllNotificationsSeen(){
  if(!S.settings.seenAlerts) S.settings.seenAlerts={};
  var keys=allNotificationKeys();
  var nowIso=new Date().toISOString();
  keys.forEach(function(k){ S.settings.seenAlerts[k]=nowIso; });
  // Also prune entries for items/states that no longer exist (housekeeping)
  var keySet={}; keys.forEach(function(k){keySet[k]=1;});
  Object.keys(S.settings.seenAlerts).forEach(function(k){
    if(!keySet[k]) delete S.settings.seenAlerts[k];
  });
  save();
}

// ── Storage ───────────────────────────────────────────────────────────────────
function localSave(){
  try{localStorage.setItem(LOCAL_KEY,JSON.stringify({items:S.items,history:S.history,settings:S.settings,dismissedAlerts:S.dismissedAlerts}));}catch(e){}
}
function localLoad(){
  try{var r=localStorage.getItem(LOCAL_KEY);if(r){var p=JSON.parse(r);S.items=p.items||[];S.history=p.history||[];if(p.settings)for(var k in p.settings)S.settings[k]=p.settings[k];S.dismissedAlerts=p.dismissedAlerts||{};}}catch(e){}
}

var saveTimer=null;
function save(){
  localSave();
  S.syncStatus='syncing'; S.syncMsg='Syncing\u2026';
  updateSyncBar();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    fetch(SB_URL+'/rest/v1/prepmacros_data?id=eq.singleton',{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({items:S.items,history:S.history,settings:S.settings,dismissed_alerts:S.dismissedAlerts,updated_at:new Date().toISOString()})
    }).then(function(){S.syncStatus='synced';S.syncMsg='Saved to cloud';updateSyncBar();})
      .catch(function(e){S.syncStatus='error';S.syncMsg='Offline \u2013 saved locally';updateSyncBar();});
  },800);
}

function updateSyncBar(){
  var bar=ge('sync-bar');
  if(!bar)return;
  var dotColor=S.syncStatus==='synced'?'#6b7c5e':S.syncStatus==='error'?'#b85c38':'#c8922a';
  var bgColor=S.syncStatus==='synced'?'rgba(122,158,126,0.15)':S.syncStatus==='error'?'rgba(184,92,56,0.15)':'rgba(200,169,110,0.2)';
  bar.style.background=bgColor;
  bar.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+dotColor+';margin-right:6px;vertical-align:middle;'+(S.syncStatus==='syncing'?'animation:pulse 1s infinite;':'')+'"></span><span style="font-size:11px;color:'+dotColor+';">'+S.syncMsg+'</span>';
}

// ── Actions ───────────────────────────────────────────────────────────────────
function addItem(){
  var f=S.form;
  if(!f.name.trim()||!f.portions)return;
  var unit=f.unit||'portions';
  var item={id:Date.now().toString(),name:f.name.trim(),category:f.category,unit:unit,portions:parseFloat(f.portions),totalPortions:parseFloat(f.portions),
    expiryDays:f.expiryDays?parseInt(f.expiryDays):null,
    macros:{cal:f.cal,protein:f.protein,carbs:f.carbs,fat:f.fat},notes:f.notes,prepDate:new Date().toISOString(),lastEaten:null};
  S.items.push(item);
  S.history.unshift({hid:newHid(),type:'prep',itemId:item.id,itemName:item.name,portions:item.portions,unit:unit,date:new Date().toISOString()});
  save();
  S.form={name:'',category:'Protein',unit:'portions',portions:'',expiryDays:'',cal:'',protein:'',carbs:'',fat:'',notes:''};
  S.view='stock';
  // Offer to log as eaten today (only if this item has macros — otherwise there's no point)
  if(item.macros && item.macros.cal){
    S.modal={type:'log-after-prep',item:item};
    S.logPortions=unitStep(unit);
  }
  render();
}

function restockItem(){
  var n=parseFloat(S.restockPortions); if(!n||!S.modal)return;
  var id=S.modal.item.id;
  var u=unitOf(S.modal.item);
  S.items=S.items.map(function(it){return it.id===id?{id:it.id,name:it.name,category:it.category,unit:it.unit,portions:it.portions+n,totalPortions:it.totalPortions+n,expiryDays:it.expiryDays,macros:it.macros,notes:it.notes,prepDate:new Date().toISOString(),lastEaten:it.lastEaten,archived:false}:it;});
  S.history.unshift({hid:newHid(),type:'prep',itemId:id,itemName:S.modal.item.name,portions:n,unit:u,date:new Date().toISOString()});
  ['exp','expw','fgt'].forEach(function(p){delete S.dismissedAlerts[p+'-'+id];});
  save();
  var restockedItem=S.items.filter(function(x){return x.id===id;})[0];
  S.modal=null;
  S.restockPortions=1;
  // Offer to log as eaten today (only if this item has macros)
  if(restockedItem && restockedItem.macros && restockedItem.macros.cal){
    S.modal={type:'log-after-prep',item:restockedItem};
    S.logPortions=unitStep(u);
  }
  render();
}

function logMeal(){
  if(!S.modal)return;
  var n=Math.min(S.logPortions,S.modal.item.portions); var id=S.modal.item.id;
  var u=unitOf(S.modal.item);
  S.items=S.items.map(function(it){return it.id===id?{id:it.id,name:it.name,category:it.category,unit:it.unit,portions:Math.max(0,it.portions-n),totalPortions:it.totalPortions,expiryDays:it.expiryDays,macros:it.macros,notes:it.notes,prepDate:it.prepDate,lastEaten:new Date().toISOString(),archived:it.archived}:it;});
  S.history.unshift({hid:newHid(),type:'eat',itemId:id,itemName:S.modal.item.name,portions:n,unit:u,date:new Date().toISOString()});
  delete S.dismissedAlerts['fgt-'+id];
  save(); S.modal=null; S.logPortions=1; render();
}

function logMealAfterPrep(){
  if(!S.modal || S.modal.type!=='log-after-prep')return;
  // Re-resolve the item from state (in case restock/add just modified it)
  var id=S.modal.item.id;
  var it=S.items.filter(function(x){return x.id===id;})[0];
  if(!it){ S.modal=null; S.logPortions=1; render(); return; }
  var n=Math.min(S.logPortions,it.portions);
  if(n<=0){ S.modal=null; S.logPortions=1; render(); return; }
  var u=unitOf(it);
  S.items=S.items.map(function(x){
    if(x.id!==id)return x;
    return {id:x.id,name:x.name,category:x.category,unit:x.unit,portions:Math.max(0,x.portions-n),totalPortions:x.totalPortions,expiryDays:x.expiryDays,macros:x.macros,notes:x.notes,prepDate:x.prepDate,lastEaten:new Date().toISOString(),archived:x.archived};
  });
  S.history.unshift({hid:newHid(),type:'eat',itemId:id,itemName:it.name,portions:n,unit:u,date:new Date().toISOString()});
  delete S.dismissedAlerts['fgt-'+id];
  save(); S.modal=null; S.logPortions=1; render();
}

function removeItem(id){
  var it=S.items.filter(function(x){return x.id===id;})[0];
  if(it)S.history.unshift({hid:newHid(),type:'deleted',itemId:id,itemName:it.name,portions:it.portions,unit:unitOf(it),date:new Date().toISOString()});
  S.items=S.items.filter(function(x){return x.id!==id;}); S.modal=null; save(); render();
}

function toggleArchive(id){
  S.items=S.items.map(function(it){
    if(it.id!==id)return it;
    return {id:it.id,name:it.name,category:it.category,unit:it.unit,portions:it.portions,totalPortions:it.totalPortions,expiryDays:it.expiryDays,macros:it.macros,notes:it.notes,prepDate:it.prepDate,lastEaten:it.lastEaten,archived:!isArchived(it)};
  });
  save(); render();
}

// History entry editing (Today tab)
function openHistoryEdit(hid){
  var entry=S.history.filter(function(x){return x.hid===hid;})[0]; if(!entry)return;
  if(entry.type==='manual'){
    // Manual entries get a different edit form
    S.modal={type:'manual-entry',entry:entry,editingHid:hid};
    S.manualForm={label:entry.label||'',cal:entry.cal||'',protein:entry.protein||'',carbs:entry.carbs||'',fat:entry.fat||''};
    render();
    return;
  }
  S.modal={type:'edit-history',entry:entry};
  S.histEditAmount=entry.portions;
  render();
}

// Manual macro entry
function openManualEntry(){
  S.modal={type:'manual-entry',entry:null,editingHid:null};
  S.manualForm={label:'',cal:'',protein:'',carbs:'',fat:''};
  render();
}

function saveManualEntry(){
  var f=S.manualForm||{};
  var cal=parseFloat(f.cal)||0;
  var protein=parseFloat(f.protein)||0;
  var carbs=parseFloat(f.carbs)||0;
  var fat=parseFloat(f.fat)||0;
  // Require at least one non-zero macro
  if(cal<=0 && protein<=0 && carbs<=0 && fat<=0){
    alert('Please enter at least one macro value.');
    return;
  }
  var label=(f.label||'').trim()||'Untitled';
  var editingHid=S.modal&&S.modal.editingHid;
  if(editingHid){
    // Update existing entry, preserving date
    S.history=S.history.map(function(x){
      if(x.hid!==editingHid) return x;
      var copy={}; for(var k in x) copy[k]=x[k];
      copy.label=label; copy.cal=cal; copy.protein=protein; copy.carbs=carbs; copy.fat=fat; copy.edited=true;
      return copy;
    });
  } else {
    S.history.unshift({hid:newHid(),type:'manual',label:label,cal:cal,protein:protein,carbs:carbs,fat:fat,date:new Date().toISOString()});
  }
  save();S.modal=null;S.manualForm=null;render();
}

function deleteManualEntry(hid){
  S.history=S.history.filter(function(x){return x.hid!==hid;});
  save();S.modal=null;S.manualForm=null;render();
}


function saveHistoryEdit(hid){
  var entry=S.history.filter(function(x){return x.hid===hid;})[0]; if(!entry)return;
  var newAmt=parseFloat(S.histEditAmount);
  if(isNaN(newAmt)||newAmt<=0){S.modal=null;render();return;}
  var delta=newAmt-entry.portions;
  // Adjust stock accordingly
  var it=S.items.filter(function(x){return x.id===entry.itemId;})[0];
  if(it){
    var stockDelta=0;
    if(entry.type==='eat'||entry.type==='waste') stockDelta=-delta; // eating/wasting MORE means less stock
    else if(entry.type==='prep') stockDelta=delta; // prepping more means more stock
    S.items=S.items.map(function(x){
      if(x.id!==it.id) return x;
      return {id:x.id,name:x.name,category:x.category,unit:x.unit,portions:Math.max(0,x.portions+stockDelta),totalPortions:Math.max(x.totalPortions,x.portions+stockDelta),expiryDays:x.expiryDays,macros:x.macros,notes:x.notes,prepDate:x.prepDate,lastEaten:x.lastEaten,archived:x.archived};
    });
  }
  // Update the history entry
  S.history=S.history.map(function(x){
    if(x.hid!==hid) return x;
    var copy={}; for(var k in x) copy[k]=x[k];
    copy.portions=newAmt;
    copy.edited=true;
    return copy;
  });
  save();S.modal=null;S.histEditAmount=0;render();
}

function deleteHistoryEntry(hid){
  var entry=S.history.filter(function(x){return x.hid===hid;})[0]; if(!entry)return;
  // Reverse the effect on stock
  var it=S.items.filter(function(x){return x.id===entry.itemId;})[0];
  if(it){
    var stockDelta=0;
    if(entry.type==='eat'||entry.type==='waste') stockDelta=entry.portions; // undo eat: add back
    else if(entry.type==='prep') stockDelta=-entry.portions; // undo prep: subtract
    S.items=S.items.map(function(x){
      if(x.id!==it.id) return x;
      return {id:x.id,name:x.name,category:x.category,unit:x.unit,portions:Math.max(0,x.portions+stockDelta),totalPortions:x.totalPortions,expiryDays:x.expiryDays,macros:x.macros,notes:x.notes,prepDate:x.prepDate,lastEaten:x.lastEaten,archived:x.archived};
    });
  }
  S.history=S.history.filter(function(x){return x.hid!==hid;});
  save();S.modal=null;render();
}

// Copy history entries forward to today.
// Returns a result {copied, skipped, partial} for user feedback.
// Copy history entries to a target date.
// dateStr should be 'YYYY-MM-DD'. Defaults to today.
// Returns a result {copied, skipped, partial} for user feedback.
function copyEntriesToDate(hids, dateStr){
  var result={copied:0, skippedNoStock:[], skippedMissing:[], partial:[], destDate:dateStr};
  var isToday=dateStr===todayStr();
  var isFuture=dateStr>todayStr();
  // Build an ISO timestamp anchored at noon on the target date so the entry
  // sorts naturally within the day. For today, use the actual current time.
  var destIso=isToday ? new Date().toISOString() : (dateStr+'T12:00:00.000Z');
  hids.forEach(function(hid){
    var src=S.history.filter(function(x){return x.hid===hid;})[0];
    if(!src) return;
    if(src.type==='manual'){
      if(isFuture){
        // Future manual entries become plans too — they shouldn't count toward macros until confirmed
        S.history.unshift({
          hid:newHid(),
          type:'planned',
          plannedKind:'manual',
          label:src.label,
          cal:src.cal,
          protein:src.protein,
          carbs:src.carbs,
          fat:src.fat,
          date:destIso
        });
      } else {
        S.history.unshift({
          hid:newHid(),
          type:'manual',
          label:src.label,
          cal:src.cal,
          protein:src.protein,
          carbs:src.carbs,
          fat:src.fat,
          date:destIso
        });
      }
      result.copied++;
    } else if(src.type==='eat'){
      var it=S.items.filter(function(x){return x.id===src.itemId;})[0];
      if(!it){ result.skippedMissing.push(src.itemName); return; }
      // For future dates, create a 'planned' entry instead of deducting stock now.
      // It will be activated (converted to a real eat entry) on the day via confirm.
      if(isFuture){
        S.history.unshift({
          hid:newHid(),
          type:'planned',
          plannedKind:'eat',
          itemId:it.id,
          itemName:it.name,
          portions:src.portions,
          unit:src.unit||unitOf(it),
          date:destIso
        });
        result.copied++;
        return;
      }
      if(it.portions<=0){ result.skippedNoStock.push(src.itemName); return; }
      var requested=src.portions;
      var actual=Math.min(requested, it.portions);
      var unit=src.unit||unitOf(it);
      S.items=S.items.map(function(x){
        if(x.id!==it.id) return x;
        return {id:x.id,name:x.name,category:x.category,unit:x.unit,portions:Math.max(0,x.portions-actual),totalPortions:x.totalPortions,expiryDays:x.expiryDays,macros:x.macros,notes:x.notes,prepDate:x.prepDate,lastEaten:destIso,archived:x.archived};
      });
      S.history.unshift({
        hid:newHid(),
        type:'eat',
        itemId:it.id,
        itemName:it.name,
        portions:actual,
        unit:unit,
        date:destIso
      });
      delete S.dismissedAlerts['fgt-'+it.id];
      result.copied++;
      if(actual<requested){
        result.partial.push({name:src.itemName, requested:requested, actual:actual, unit:unit});
      }
    }
  });
  save();
  return result;
}

// Backward-compat shim
function copyEntriesToToday(hids){
  return copyEntriesToDate(hids, todayStr());
}

function buildCopyResultMessage(result, destDate){
  var dest=destDate||result.destDate||todayStr();
  var destLabel=dest===todayStr()?'today':fmtDateLabel(dest).toLowerCase();
  var lines=[];
  if(result.copied>0) lines.push(result.copied+' entr'+(result.copied===1?'y':'ies')+' copied to '+destLabel+'.');
  if(result.partial.length){
    result.partial.forEach(function(p){
      var sfx=p.unit==='portions'?(' portion'+(p.actual!==1?'s':'')):p.unit;
      var rsfx=p.unit==='portions'?(' portion'+(p.requested!==1?'s':'')):p.unit;
      lines.push('Partial: '+p.name+' — only '+p.actual+sfx+' available (wanted '+p.requested+rsfx+')');
    });
  }
  if(result.skippedNoStock.length){
    lines.push('Skipped (no stock): '+result.skippedNoStock.join(', '));
  }
  if(result.skippedMissing.length){
    lines.push('Skipped (item removed): '+result.skippedMissing.join(', '));
  }
  return lines.join('\n');
}

// Category management
function renameCategory(oldName, newName){
  newName=(newName||'').trim();
  if(!newName || newName===oldName) return;
  // Guard against duplicates
  if(S.settings.categories.indexOf(newName)!==-1){ alert('A category named "'+newName+'" already exists.'); return; }
  // Guard against renaming to "All" (reserved)
  if(newName==='All'){ alert('"All" is a reserved name.'); return; }
  // Update the settings list
  S.settings.categories=S.settings.categories.map(function(c){return c===oldName?newName:c;});
  // Update all items that reference the old name
  S.items=S.items.map(function(it){
    if(it.category!==oldName) return it;
    var copy={}; for(var k in it) copy[k]=it[k];
    copy.category=newName;
    return copy;
  });
  // Fix filterCat if it was pointing at the renamed one
  if(S.filterCat===oldName) S.filterCat=newName;
  // Fix form/editForm in-progress state
  if(S.form && S.form.category===oldName) S.form.category=newName;
  if(S.editForm && S.editForm.category===oldName) S.editForm.category=newName;
  save(); render();
}

function moveCategory(cat, direction){
  var arr=S.settings.categories.slice();
  var idx=arr.indexOf(cat);
  if(idx<0) return;
  var newIdx=idx+direction;
  if(newIdx<0 || newIdx>=arr.length) return;
  var tmp=arr[idx]; arr[idx]=arr[newIdx]; arr[newIdx]=tmp;
  S.settings.categories=arr;
  save(); render();
}

function promptRenameCategory(cat){
  var next=prompt('Rename category "'+cat+'" to:', cat);
  if(next!=null) renameCategory(cat, next);
}

  else if(S.view==='add') main+=renderAdd();
  else if(S.view==='log') main+=renderLog();
  else if(S.view==='today') main+=renderToday();
  else if(S.view==='history') main+=renderHistory();
  else if(S.view==='settings') main+=renderSettings();
  main+='</div>';

  // ── Modal
  var modal=S.modal?renderModal():'';

  app.style.cssText='min-height:100vh;display:flex;flex-direction:column;';
  app.innerHTML=header+main+modal;
}

function setView(v){
  // Clear the stock filter when moving away from stock view

  S.view=v;
  render();
}
function jumpToLowStock(){ S.stockFilter='low'; S.view='stock'; S.filterCat='All'; render(); }
function jumpToOutStock(){ S.stockFilter='out'; S.view='stock'; S.filterCat='All'; render(); }

function openNotifications(){
  // Mark current notifications as seen the moment the modal opens
  markAllNotificationsSeen();
  S.modal={type:'notifications'};
  render();
}

function jumpToItem(id){
  // Close modal, switch to Stock view, expand the item card
  S.modal=null;
  S.view='stock';
  S.filterCat='All';
  S.stockFilter='all';
  S.expandedId=id;
  render();
  // Try to scroll the item into view after the render
  setTimeout(function(){

function dismissAlert(key){ S.dismissedAlerts[key]=todayStr(); save(); render(); }
function toggleExpand(id){ S.expandedId=S.expandedId===id?null:id; render(); }

// ── Stock view
function renderStock(){
  // Archived items are never shown in stock unless the showArchived toggle is on
  var baseItems=S.showArchived?S.items.filter(isArchived):S.items.filter(function(it){return !isArchived(it);});

  // Apply category filter
  var items=S.filterCat==='All'?baseItems:baseItems.filter(function(it){return it.category===S.filterCat;});

  // Apply stock filter (from Low/Out badge tap)
  if(!S.showArchived){
    if(S.stockFilter==='low') items=items.filter(function(it){return it.portions>0&&it.portions<=S.settings.lowStockThreshold;});
    else if(S.stockFilter==='out') items=items.filter(function(it){return it.portions===0;});
  }

  // Sort by user-defined order (falls back to original sequence for items with no order field yet)
  items.sort(function(a,b){
    var ao=typeof a.order==='number'?a.order:9999;
    var bo=typeof b.order==='number'?b.order:9999;
    return ao-bo;
  });

  var h='';

  // Archived banner + toggle
  var archCount=archivedC();
  if(S.showArchived){
    h+='<div style="background:#f5ecd9;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">';
    h+='<div style="font-size:13px;color:#5c3d2e;"><strong>Viewing archived</strong> ('+archCount+' item'+(archCount!==1?'s':'')+')</div>';
    h+='<button onclick="S.showArchived=false;render();" style="background:#5c3d2e;color:#faf6ef;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Back to stock</button>';
    h+='</div>';
  }

  // Stock filter banner (when viewing low/out via badge tap)
  if(!S.showArchived && S.stockFilter!=='all'){
    var label=S.stockFilter==='low'?'Showing low-stock items':'Showing out-of-stock items';
    h+='<div style="background:#fdf6e3;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">';
    h+='<div style="font-size:13px;color:#5c3d2e;">'+label+'</div>';
    h+='<button onclick="S.stockFilter=\'all\';render();" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Show all</button>';
    h+='</div>';
  }

  // Category filter pills (only shown when not viewing archived and no stock filter)
  if(!S.showArchived && S.stockFilter==='all' && !S.reorderMode){
    h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;">';
    CATS.forEach(function(c){
      var active=S.filterCat===c;
      var count=c==='All'?activeItems().length:activeItems().filter(function(it){return it.category===c;}).length;
      var badgeBg=active?'rgba(240,217,181,0.25)':'#f5ecd9';
      var badgeColor=active?'#faf6ef':'#5c3d2e';
      var badge=count>0?'<span style="background:'+badgeBg+';border-radius:10px;padding:1px 7px;margin-left:6px;font-size:11px;font-weight:700;color:'+badgeColor+';">'+count+'</span>':'';
      h+='<button onclick="S.filterCat=\''+c+'\';render();" style="padding:5px 12px;border-radius:20px;white-space:nowrap;font-size:12px;border:'+(active?'none':'1px solid #eadec5')+';background:'+(active?'#5c3d2e':'transparent')+';color:'+(active?'#faf6ef':'#5c3d2e')+';display:inline-flex;align-items:center;">'+c+badge+'</button>';
    });
    h+='</div>';
  }

  // Reorder mode banner
  if(S.reorderMode){
    h+='<div style="background:#f5ecd9;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">';
    h+='<div style="font-size:13px;color:#5c3d2e;"><strong>Reorder mode</strong> — use ▲▼ to rearrange</div>';
    h+='<button onclick="exitReorderMode()" style="background:#5c3d2e;color:#faf6ef;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Done</button>';
    h+='</div>';
  }

  if(!items.length){
    h+='<div style="text-align:center;padding:48px 20px;color:#8a7560;">';
    h+='<div style="font-size:40px;margin-bottom:12px;">'+(S.showArchived?'📦':'🥡')+'</div>';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:6px;color:#5c3d2e;">'+(S.showArchived?'No archived items':(S.stockFilter==='low'?'Nothing low':(S.stockFilter==='out'?'Nothing out of stock':'No items yet')))+'</div>';
    if(!S.showArchived && S.stockFilter==='all') h+='<div style="font-size:13px;">Tap &quot;+ Add&quot; to log your first prep batch</div>';
    h+='</div>';
  } else if(S.reorderMode){
    h+='<div id="reorder-list">';
    items.forEach(function(it){ h+=renderReorderCard(it); });
    h+='</div>';
  } else {
    items.forEach(function(it){ h+=renderCard(it); });
  }

  // Archive access footer + Reorder toggle (only on default stock view)
  if(!S.showArchived && S.stockFilter==='all' && !S.reorderMode){
    h+='<div style="display:flex;gap:8px;margin-top:16px;">';
    if(items.length>1) h+='<button onclick="enterReorderMode()" style="flex:1;background:transparent;border:1px dashed #d9c9a8;color:#5c3d2e;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;">↕ Reorder</button>';
    if(archCount>0) h+='<button onclick="S.showArchived=true;S.expandedId=null;render();" style="flex:1;background:transparent;border:1px dashed #d9c9a8;color:#5c3d2e;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;">📁 Archived ('+archCount+')</button>';
    h+='</div>';
  }

  return h;
}

function renderCard(it){
  var pct=it.totalPortions>0?it.portions/it.totalPortions:0;
  var exp=S.expandedId===it.id, oos=it.portions===0;
  var isLow=it.portions>0&&it.portions<=S.settings.lowStockThreshold;
  var expDays=it.expiryDays!=null?it.expiryDays:S.settings.expiryDays;
  var age=daysSince(it.prepDate);
  var isExp=!!(expDays&&age>=expDays), isExpW=!isExp&&!!(expDays&&age>=expDays-1);
  var sinceEat=daysSince(it.lastEaten||it.prepDate), isFgt=sinceEat>=S.settings.forgottenDays;
  var borderColor=isExp?'#b85c38':isExpW||isLow?'#c4a84b':'#d9c9a8';
  var portColor=oos?'#b85c38':isLow?'#c4a84b':'#5c3d2e';

  var h='<div style="background:#ffffff;border-radius:14px;border:1.5px solid '+borderColor+';overflow:hidden;margin-bottom:10px;">';

  // Header row (tappable)
  h+='<div onclick="toggleExpand(\''+it.id+'\')" style="padding:14px 16px;cursor:pointer;">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
  h+='<div style="flex:1;min-width:0;">';
  h+='<div style="font-weight:700;font-size:16px;">'+esc(it.name)+'</div>';
  h+='<div style="font-size:11px;color:#8a7560;margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">';
  h+='<span style="background:#f5ecd9;border-radius:10px;padding:2px 8px;color:#5c3d2e;">'+esc(it.category)+'</span>';
  if(isExp) h+='<span style="background:#ffe8e0;border-radius:10px;padding:2px 8px;color:#8a2010;">⚠️ Expired</span>';
  else if(isExpW) h+='<span style="background:#fff0cc;border-radius:10px;padding:2px 8px;color:#8a6010;">🕐 Exp. soon</span>';
  else h+='<span>prepped '+(daysAgo(it.prepDate)||'—')+'</span>';
  if(isLow&&!oos) h+='<span style="background:#fff0cc;border-radius:10px;padding:2px 8px;color:#8a6010;">⚡ Low</span>';
  if(isFgt&&!oos) h+='<span style="background:#ece8f8;border-radius:10px;padding:2px 8px;color:#6050a0;">💤 Forgotten</span>';
  if(it.lastEaten) h+='<span>eaten '+daysAgo(it.lastEaten)+'</span>';
  h+='</div></div>';
  h+='<div style="text-align:right;flex-shrink:0;margin-left:10px;">';
  var u=unitOf(it);
  var displayNum=u==='portions'?it.portions:it.portions;
  var displayLbl=u==='portions'?'portions':u;
  h+='<div style="font-size:24px;font-weight:700;line-height:1;color:'+portColor+';">'+displayNum+'</div>';
  h+='<div style="font-size:10px;color:#8a7560;">'+displayLbl+'</div></div></div>';
  // Progress bar
  h+='<div style="background:#eadec5;border-radius:4px;height:5px;margin-top:10px;">';
  h+='<div style="width:'+Math.max(2,pct*100)+'%;height:100%;border-radius:4px;background:'+barColor(pct)+';"></div></div>';
  h+='</div>'; // end header

  if(exp){
    h+='<div style="padding:0 16px 14px;border-top:1px solid #f5ecd9;">';
    if(it.macros&&it.macros.cal){
      var u=unitOf(it);
      var macroLabel=u==='portions'?'Per portion':'Per 100'+u;
      h+='<div style="font-size:11px;color:#8a7560;margin-top:12px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">'+macroLabel+'</div>';
      h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;">';
      [['Cal',it.macros.cal],['Protein',it.macros.protein+'g'],['Carbs',it.macros.carbs+'g'],['Fat',it.macros.fat+'g']].forEach(function(m){
        h+='<div style="background:#f5ecd9;border-radius:8px;padding:6px 4px;text-align:center;">';
        h+='<div style="font-size:13px;font-weight:700;">'+m[1]+'</div>';
        h+='<div style="font-size:10px;color:#8a7560;">'+m[0]+'</div></div>';
      });
      h+='</div>';
    }
    if(it.notes) h+='<div style="font-size:12px;color:#5c3d2e;margin-bottom:10px;font-style:italic;">&quot;'+esc(it.notes)+'&quot;</div>';
    if(expDays&&!isArchived(it)) h+='<div style="font-size:12px;color:#8a7560;margin-bottom:10px;">Expiry: '+expDays+' days &middot; '+(isExp?'<span style="color:#b85c38;font-weight:700;">Expired</span>':(expDays-age)+'d remaining')+'</div>';

    if(isArchived(it)){
      // Archived items get a simpler action row
      h+='<div style="display:flex;gap:8px;">';
      h+='<button onclick="openArchiveConfirm(\''+it.id+'\')" style="'+cs.btnPrimary+'flex:1;">📤 Unarchive</button>';
      h+='<button onclick="openEdit(\''+it.id+'\')" style="'+cs.btnSecondary+'padding:8px 10px;">✏️</button>';
      h+='<button onclick="openRemoveModal(\''+it.id+'\')" style="'+cs.btnDanger+'">✕</button>';
      h+='</div>';
    } else {
      h+='<div style="display:flex;gap:8px;">';
      h+='<button onclick="openLogModal(\''+it.id+'\')" '+(oos?'disabled':'')+' style="'+cs.btnPrimary+'flex:1;opacity:'+(oos?0.4:1)+';">🍽 Eat</button>';
      h+='<button onclick="openRestockModal(\''+it.id+'\')" style="'+cs.btnSecondary+'flex:1;">🥡 Restock</button>';
      h+='<button onclick="openWasteModal(\''+it.id+'\')" '+(oos?'disabled':'')+' style="'+cs.btnSecondary+'flex:1;opacity:'+(oos?0.4:1)+';">🗑 Waste</button>';
      h+='<button onclick="openEdit(\''+it.id+'\')" style="'+cs.btnSecondary+'padding:8px 10px;">✏️</button>';
      h+='<button onclick="openRemoveModal(\''+it.id+'\')" style="'+cs.btnDanger+'">✕</button>';
      h+='</div>';
    }
    h+='</div>';
  }

  h+='</div>';
  return h;
}

function openLogModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it&&it.portions>0){S.modal={type:'log',item:it};S.logPortions=unitStep(unitOf(it));render();} }
function openRestockModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it){S.modal={type:'restock',item:it};S.restockPortions=unitStep(unitOf(it));render();} }
function openWasteModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it&&it.portions>0){S.modal={type:'waste',item:it};S.wastePortions=unitStep(unitOf(it));render();} }
function openRemoveModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it){S.modal={type:'confirm-remove',item:it};render();} }

// Reorder mode helpers
function enterReorderMode(){
  // Assign initial order values for items that don't have one yet, preserving current visual order
  var visible=S.items.filter(function(it){return !isArchived(it);});
  visible.sort(function(a,b){
    var ao=typeof a.order==='number'?a.order:9999;
    var bo=typeof b.order==='number'?b.order:9999;
    return ao-bo;
  });
  visible.forEach(function(it,i){ it.order=i; });
  S.reorderMode=true;
  S.expandedId=null;
  render();
}

function exitReorderMode(){
  S.reorderMode=false;
  save();
  render();
}

function moveItem(id,direction){
  // Get current ordered list of active items
  var visible=S.items.filter(function(it){return !isArchived(it);});
  visible.sort(function(a,b){
    var ao=typeof a.order==='number'?a.order:9999;
    var bo=typeof b.order==='number'?b.order:9999;
    return ao-bo;
  });
  var idx=-1;
  for(var i=0;i<visible.length;i++){ if(visible[i].id===id){idx=i;break;} }
  if(idx<0) return;
  var newIdx=idx+direction;
  if(newIdx<0||newIdx>=visible.length) return;
  // Swap
  var tmp=visible[idx]; visible[idx]=visible[newIdx]; visible[newIdx]=tmp;
  // Reassign order values
  visible.forEach(function(it,i){ it.order=i; });
  render();
}

function renderReorderCard(it){

  h+='<button onclick="moveItem(\''+it.id+'\',1)" style="width:36px;height:36px;border-radius:8px;border:1px solid #d9c9a8;background:transparent;font-size:16px;cursor:pointer;flex-shrink:0;">▼</button>';

// ── Log view
function renderLog(){
  var avail=S.items.filter(function(it){return it.portions>0 && !isArchived(it);});
  // Apply category filter (reuse S.filterCat, shared with Stock view)
  var filtered=S.filterCat==='All'?avail:avail.filter(function(it){return it.category===S.filterCat;});
  // Sort by most stock first — raw portions primary, ratio as tiebreaker.
  // Caveat: comparing portions across units (e.g. 500g vs 8 portions) isn't
  // perfectly meaningful, but within the same unit it gives the expected order.
  filtered.sort(function(a,b){
    if(b.portions!==a.portions) return b.portions-a.portions;
    var ra=a.totalPortions>0?a.portions/a.totalPortions:0;
    var rb=b.totalPortions>0?b.portions/b.totalPortions:0;
    return rb-ra;
  });
  var h='<div class="pm-heading" style="font-size:28px;font-weight:600;margin-bottom:6px;letter-spacing:0.04em;">Food Log</div>';
  h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">Tap an item to deduct from stock or log a manual entry</div>';

  // Manual entry button (above category pills)
  h+='<button onclick="openManualEntry()" style="background:transparent;border:1px dashed #d9c9a8;color:#5c3d2e;border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;margin-bottom:14px;">+ Add manual entry</button>';

  // Category filter pills
  if(avail.length){
    h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;">';
    CATS.forEach(function(c){
      var active=S.filterCat===c;
      var count=c==='All'?avail.length:avail.filter(function(it){return it.category===c;}).length;
      if(c!=='All' && count===0) return; // Hide empty categories in Log view to reduce clutter
      var badgeBg=active?'rgba(240,217,181,0.25)':'#f5ecd9';
      var badgeColor=active?'#faf6ef':'#5c3d2e';
      var badge=count>0?'<span style="background:'+badgeBg+';border-radius:10px;padding:1px 7px;margin-left:6px;font-size:11px;font-weight:700;color:'+badgeColor+';">'+count+'</span>':'';
      h+='<button onclick="S.filterCat=\''+c+'\';render();" style="padding:5px 12px;border-radius:20px;white-space:nowrap;font-size:12px;border:'+(active?'none':'1px solid #eadec5')+';background:'+(active?'#5c3d2e':'transparent')+';color:'+(active?'#faf6ef':'#5c3d2e')+';display:inline-flex;align-items:center;">'+c+badge+'</button>';
    });
    h+='</div>';
  }

  if(!avail.length){
    h+='<div style="text-align:center;padding:48px 20px;color:#8a7560;"><div style="font-size:40px;margin-bottom:12px;">😅</div>';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:6px;color:#5c3d2e;">No stock available</div>';
    h+='<div style="font-size:13px;">Time to prep!</div></div>';
    return h;
  }

  if(!filtered.length){
    h+='<div style="text-align:center;padding:32px 20px;color:#8a7560;">';
    h+='<div style="font-size:14px;">Nothing in '+esc(S.filterCat)+' available.</div>';
    h+='<button onclick="S.filterCat=\'All\';render();" style="margin-top:12px;background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;">Show all</button>';
    h+='</div>';
    return h;
  }

  filtered.forEach(function(it){
    var fgt=daysSince(it.lastEaten||it.prepDate)>=S.settings.forgottenDays;
    var u=unitOf(it);
    var macrosMeta='';
    if(it.macros&&it.macros.cal){
      macrosMeta=' · '+it.macros.cal+' cal, '+it.macros.protein+'g pro '+(u==='portions'?'per portion':'per 100'+u);
    }
    h+='<button onclick="openLogModal(\''+it.id+'\')" style="background:#ffffff;border:1px solid '+(fgt?'#9080c0':'#d9c9a8')+';border-radius:12px;padding:14px 16px;width:100%;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
    h+='<div><div style="font-weight:700;font-size:15px;color:#5c3d2e;">'+esc(it.name)+(fgt?' 💤':'')+'</div>';
    h+='<div style="font-size:12px;color:#5c3d2e;margin-top:2px;">'+esc(it.category)+macrosMeta+'</div></div>';
    h+='<div style="background:#5c3d2e;color:#faf6ef;border-radius:20px;padding:4px 14px;font-size:14px;font-weight:700;flex-shrink:0;">'+it.portions+(u==='portions'?'':u)+'</div>';
    h+='</button>';
  });
  return h;
}

// ── Today view
function renderToday(){
  var t=todayStr();
  var todays=S.history.filter(function(x){return x.date&&x.date.indexOf(t)===0;});
  var macros=todayMacros();
  var h='<div class="pm-heading" style="font-size:28px;font-weight:600;margin-bottom:6px;letter-spacing:0.04em;">Today</div>';
  h+='<div style="color:#5c3d2e;font-size:13px;margin-bottom:16px;">'+new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+'</div>';

  // Macro summary / gauges card
  var sm=macros||{cal:0,protein:0,carbs:0,fat:0};
  var showCard=macros||hasTargets();
  if(showCard){
    var ringColors={cal:'#4a6fa5',protein:'#a84f2e',carbs:'#c8922a',fat:'#6b7c5e'};
    h+='<div style="background:#ffffff;border:1px solid #d9c9a8;border-radius:14px;padding:16px;margin-bottom:20px;">';

    if(hasTargets()){
      // Detailed gauges when targets are set
      h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;">';
      h+='<div style="font-size:11px;color:#8a7560;text-transform:uppercase;letter-spacing:0.5px;">Daily targets</div>';
      h+='<button onclick="setView(\'settings\')" style="background:none;border:none;font-size:11px;color:#8a7560;cursor:pointer;padding:0;">Adjust ›</button>';
      h+='</div>';

      var macroRows=[
        ['Calories',sm.cal,S.settings.targetCal,'',ringColors.cal],
        ['Protein',sm.protein,S.settings.targetProtein,'g',ringColors.protein],
        ['Carbs',sm.carbs,S.settings.targetCarbs,'g',ringColors.carbs],
        ['Fat',sm.fat,S.settings.targetFat,'g',ringColors.fat]
      ];
      macroRows.forEach(function(row,i){
        var label=row[0],val=row[1],tgt=row[2],sfx=row[3],col=row[4];
        if(tgt<=0) return; // skip macros without a target set
        var remaining=tgt-val;
        var pct=val/tgt;
        var rightLabel, rightColor;
        if(remaining>=0){
          rightLabel=remaining+sfx+' left';
          rightColor='#5c3d2e';
        } else {
          rightLabel=Math.abs(remaining)+sfx+' over';
          rightColor='#b85c38';
        }
        h+='<div style="margin-bottom:'+(i<macroRows.length-1?'14px':'0')+';">';
        h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">';
        h+='<div style="font-size:13px;font-weight:700;color:#5c3d2e;">'+label+'</div>';
        h+='<div style="font-size:13px;color:'+rightColor+';"><strong>'+val+sfx+'</strong> <span style="color:#8a7560;"> / '+tgt+sfx+'</span></div>';
        h+='</div>';
        h+=progressBar(pct,col);
        h+='<div style="text-align:right;font-size:11px;color:'+rightColor+';margin-top:3px;">'+rightLabel+'</div>';
        h+='</div>';
      });
      // For any macros without a target set, show them as a simple row
      var untargeted=macroRows.filter(function(r){return r[2]<=0;});
      if(untargeted.length && macros){
        h+='<div style="border-top:1px solid #f5ecd9;margin-top:12px;padding-top:12px;">';
        h+='<div style="font-size:10px;color:#8a7560;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">No target set</div>';
        h+='<div style="display:flex;gap:14px;flex-wrap:wrap;">';
        untargeted.forEach(function(r){
          h+='<div style="font-size:12px;color:#5c3d2e;"><strong>'+r[1]+r[3]+'</strong> '+r[0]+'</div>';
        });
        h+='</div></div>';
      }
    } else {
      // No targets set — show the original simple macro grid + a prompt
      h+='<div style="font-size:11px;color:#8a7560;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Consumed today</div>';
      h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;">';
      [['Cal',sm.cal],['Protein',sm.protein+'g'],['Carbs',sm.carbs+'g'],['Fat',sm.fat+'g']].forEach(function(m){
        h+='<div style="background:#f5ecd9;border-radius:8px;padding:10px 4px;text-align:center;">';
        h+='<div style="font-size:16px;font-weight:700;color:#5c3d2e;">'+m[1]+'</div>';
        h+='<div style="font-size:10px;color:#8a7560;text-transform:uppercase;">'+m[0]+'</div></div>';
      });
      h+='</div>';
      h+='<button onclick="setView(\'settings\')" style="background:transparent;border:1px dashed #d9c9a8;color:#5c3d2e;border-radius:10px;padding:10px;width:100%;font-size:12px;cursor:pointer;">🎯 Set daily targets in Settings</button>';
    }

    h+='</div>';
  }

  // Split activity by type
  var ate=todays.filter(function(x){return x.type==='eat';});
  var wasted=todays.filter(function(x){return x.type==='waste';});
  var prepped=todays.filter(function(x){return x.type==='prep';});
  var manualEntries=todays.filter(function(x){return x.type==='manual';});
  var plannedToday=todays.filter(function(x){return x.type==='planned';});

  // Treat planned-only days as "something to do" rather than empty
  if(!todays.length){
    if(hasTargets()){
      h+='<div style="text-align:center;padding:16px 20px;color:#8a7560;font-size:13px;">No meals logged yet — log a meal or add a manual entry</div>';
    } else {
      h+='<div style="text-align:center;padding:48px 20px;color:#8a7560;">';
      h+='<div style="font-size:40px;margin-bottom:12px;">🌱</div>';
      h+='<div style="font-size:18px;font-weight:700;margin-bottom:6px;color:#5c3d2e;">Nothing logged yet</div>';
      h+='<div style="font-size:13px;">Log a meal or add a manual entry</div></div>';
    }
    return h;
  }

  // Section: Planned for today (planned eat entries that haven't been confirmed yet)
  if(plannedToday.length){
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
    h+='<div style="font-size:11px;font-weight:700;color:#5c3d2e;text-transform:uppercase;letter-spacing:0.8px;">📅 Planned ('+plannedToday.length+')</div>';
    h+='<button onclick="confirmAllPlannedToday()" style="background:#5c3d2e;color:#faf6ef;border:none;border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;">Confirm all</button>';
    h+='</div>';
    h+='<div style="background:#fffbf4;border-radius:12px;border:1px dashed #c8922a;padding:0 14px;margin-bottom:16px;">';
    plannedToday.forEach(function(x,i){
      var isManualPlan=x.plannedKind==='manual';
      var rowName, rowDetail;
      if(isManualPlan){
        rowName=x.label||'Untitled';
        var parts=[];
        if(x.cal) parts.push(Math.round(x.cal)+' cal');
        if(x.protein) parts.push(Math.round(x.protein)+'g pro');
        if(x.carbs) parts.push(Math.round(x.carbs)+'g carbs');
        if(x.fat) parts.push(Math.round(x.fat)+'g fat');
        rowDetail='Manual plan'+(parts.length?' · '+parts.join(' · '):'');
      } else {
        rowName=x.itemName;
        var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
        var u=x.unit||(it?unitOf(it):'portions');
        var unitSuffix=u==='portions'?(' portion'+(x.portions>1?'s':'')):u;
        var stockNote='';
        if(!it){
          stockNote=' · <span style="color:#a84f2e;">item removed</span>';
        } else if(it.portions<=0){
          stockNote=' · <span style="color:#a84f2e;">no stock</span>';
        } else if(it.portions<x.portions){
          stockNote=' · <span style="color:#c8922a;">only '+it.portions+(u==='portions'?'':u)+' available</span>';
        }
        rowDetail=x.portions+unitSuffix+stockNote;
      }
      h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;'+(i<plannedToday.length-1?'border-bottom:1px solid #eadec5;':'')+'">';
      h+='<div style="flex:1;min-width:0;">';
      h+='<div style="font-size:14px;font-weight:700;">'+esc(rowName)+'</div>';
      h+='<div style="font-size:12px;color:#8a7560;">'+rowDetail+'</div>';
      h+='</div>';
      h+='<button onclick="confirmPlannedEntryUI(\''+x.hid+'\')" style="background:#5c3d2e;color:#faf6ef;border:none;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;flex-shrink:0;">Confirm</button>';
      h+='<button onclick="cancelPlannedEntry(\''+x.hid+'\')" style="background:transparent;border:1px solid #d9c9a8;color:#8a7560;border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;flex-shrink:0;">Cancel</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Section: Manual entries
  if(manualEntries.length){
    h+='<div style="font-size:11px;font-weight:700;color:#5c3d2e;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">✏️ Manual ('+manualEntries.length+')</div>';
    h+='<div style="background:#ffffff;border-radius:12px;border:1px solid #d9c9a8;padding:0 14px;margin-bottom:16px;">';
    manualEntries.forEach(function(x,i){
      var time=new Date(x.date).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      var parts=[];
      if(x.cal) parts.push(Math.round(x.cal)+' cal');
      if(x.protein) parts.push(Math.round(x.protein)+'g pro');
      if(x.carbs) parts.push(Math.round(x.carbs)+'g carbs');
      if(x.fat) parts.push(Math.round(x.fat)+'g fat');
      h+='<div onclick="openHistoryEdit(\''+x.hid+'\')" style="display:flex;align-items:center;gap:12px;padding:10px 0;cursor:pointer;'+(i<manualEntries.length-1?'border-bottom:1px solid #eadec5;':'')+'">';
      h+='<div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;">'+esc(x.label||'Untitled')+(x.edited?' <span style="font-size:10px;color:#8a7560;font-weight:400;">(edited)</span>':'')+'</div>';
      h+='<div style="font-size:12px;color:#5c3d2e;">'+parts.join(' · ')+' · '+time+'</div></div>';
      h+='<div style="font-size:13px;color:#8a7560;">›</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Section: Meals eaten
  if(ate.length){
    h+='<div style="font-size:11px;font-weight:700;color:#5c3d2e;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">🍽 Meals ('+ate.length+')</div>';
    h+='<div style="background:#ffffff;border-radius:12px;border:1px solid #d9c9a8;padding:0 14px;margin-bottom:16px;">';
    ate.forEach(function(x,i){
      var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
      var u=x.unit||(it?unitOf(it):'portions');
      var unitSuffix=u==='portions'?' portion'+(x.portions>1?'s':''):u;
      var m=it?macroFor(it,x.portions):null;
      var time=new Date(x.date).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      var tappable=!!x.hid;
      var rowStyle='display:flex;align-items:center;gap:12px;padding:10px 0;'+(i<ate.length-1?'border-bottom:1px solid #eadec5;':'');
      if(tappable){
        h+='<div onclick="openHistoryEdit(\''+x.hid+'\')" style="'+rowStyle+'cursor:pointer;">';
      } else {
        h+='<div style="'+rowStyle+'">';
      }
      h+='<div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;">'+esc(x.itemName)+(x.edited?' <span style="font-size:10px;color:#8a7560;font-weight:400;">(edited)</span>':'')+'</div>';
      h+='<div style="font-size:12px;color:#5c3d2e;">'+x.portions+unitSuffix+(m?' · '+Math.round(m.cal)+' cal':'')+' · '+time+'</div></div>';
      if(tappable) h+='<div style="font-size:13px;color:#8a7560;">›</div>';
      h+='</div>';

  if(wasted.length){
    h+='<div style="font-size:11px;font-weight:700;color:#5c3d2e;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">🗑 Wasted ('+wasted.length+')</div>';
    h+='<div style="background:#ffffff;border-radius:12px;border:1px solid #d9c9a8;padding:0 14px;margin-bottom:16px;">';

      var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
      var u=x.unit||(it?unitOf(it):'portions');
      var unitSuffix=u==='portions'?' portion'+(x.portions>1?'s':''):u;
      var time=new Date(x.date).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      var tappable=!!x.hid;
      var rowStyle='display:flex;align-items:center;gap:12px;padding:10px 0;'+(i<wasted.length-1?'border-bottom:1px solid #eadec5;':'');
      if(tappable){
        h+='<div onclick="openHistoryEdit(\''+x.hid+'\')" style="'+rowStyle+'cursor:pointer;">';
      } else {
        h+='<div style="'+rowStyle+'">';
      }
      h+='<div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;">'+esc(x.itemName)+(x.edited?' <span style="font-size:10px;color:#8a7560;font-weight:400;">(edited)</span>':'')+'</div>';
      h+='<div style="font-size:12px;color:#b85c38;">'+x.portions+unitSuffix+' · '+time+'</div></div>';
      if(tappable) h+='<div style="font-size:13px;color:#8a7560;">›</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Section: Prepped
  if(prepped.length){
    h+='<div style="font-size:11px;font-weight:700;color:#5c3d2e;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">🥡 Prepped ('+prepped.length+')</div>';
    h+='<div style="background:#ffffff;border-radius:12px;border:1px solid #d9c9a8;padding:0 14px;margin-bottom:16px;">';
    prepped.forEach(function(x,i){
      var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
      var u=x.unit||(it?unitOf(it):'portions');
      var unitSuffix=u==='portions'?' portion'+(x.portions>1?'s':''):u;
      var time=new Date(x.date).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      var tappable=!!x.hid;
      var rowStyle='display:flex;align-items:center;gap:12px;padding:10px 0;'+(i<prepped.length-1?'border-bottom:1px solid #eadec5;':'');
      if(tappable){
        h+='<div onclick="openHistoryEdit(\''+x.hid+'\')" style="'+rowStyle+'cursor:pointer;">';
      } else {
        h+='<div style="'+rowStyle+'">';

      h+='<div style="font-size:12px;color:#6b7c5e;">'+x.portions+unitSuffix+' · '+time+'</div></div>';
      if(tappable) h+='<div style="font-size:13px;color:#8a7560;">›</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  return h;
}

// ── History view
function renderHistory(){
  if(!S.selectedDate) S.selectedDate=todayStr();
  var sel=S.selectedDate;
  var t=todayStr();
  var isToday=sel===t;

  // Find earliest history date for "no further back" detection
  var earliestDate=null;
  S.history.forEach(function(x){
    if(!x.date) return;
    var d=x.date.split('T')[0];
    if(!earliestDate || d<earliestDate) earliestDate=d;
  });
  var canGoBack=!earliestDate || sel>earliestDate;
  // Forward navigation now allowed past today (for planning ahead)
  var canGoForward=true;

  // Entries for selected day
  var dayEntries=S.history.filter(function(x){return x.date && x.date.indexOf(sel)===0;});
  // Sort EARLIEST first within the day (chronological top-to-bottom)
  dayEntries.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});

  // Split into "eaten" (eat + manual), "planned" (future plans), and "other" (waste + prep + deleted)
  var eaten=dayEntries.filter(function(x){return x.type==='eat'||x.type==='manual';});
  var plannedEntries=dayEntries.filter(function(x){return x.type==='planned';});
  var other=dayEntries.filter(function(x){return x.type==='waste'||x.type==='prep'||x.type==='deleted';});
  var copyableCount=eaten.filter(function(x){return !!x.hid;}).length;

  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
  h+='<div class="pm-heading" style="font-size:28px;font-weight:600;letter-spacing:0.04em;">History</div>';
  if(!S.historySelectMode && copyableCount>0){
    h+='<button onclick="toggleSelectMode()" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Multi-copy</button>';
  } else if(S.historySelectMode){
    h+='<button onclick="toggleSelectMode()" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Cancel</button>';
  }
  h+='</div>';

  // Date navigation (centre cell opens calendar)
  h+='<div style="display:flex;align-items:center;justify-content:space-between;background:#ffffff;border:1px solid #d9c9a8;border-radius:12px;padding:6px;margin-bottom:14px;">';
  h+='<button onclick="S.selectedDate=shiftDate(S.selectedDate,-1);S.historySelectMode=false;S.selectedHids={};render();" '+(!canGoBack?'disabled':'')+' style="width:36px;height:36px;border-radius:8px;border:none;background:transparent;font-size:16px;cursor:pointer;color:#5c3d2e;opacity:'+(canGoBack?1:0.3)+';">◀</button>';
  h+='<button onclick="openCalendar(\'navigate\')" style="text-align:center;flex:1;cursor:pointer;background:transparent;border:none;padding:4px 8px;">';
  h+='<div class="pm-heading" style="font-size:17px;font-weight:600;color:#5c3d2e;letter-spacing:0.02em;">'+esc(fmtDateLabel(sel))+'</div>';
  h+='<div style="font-size:11px;color:#8a7560;">tap for calendar</div>';
  h+='</button>';
  h+='<button onclick="S.selectedDate=shiftDate(S.selectedDate,1);S.historySelectMode=false;S.selectedHids={};render();" style="width:36px;height:36px;border-radius:8px;border:none;background:transparent;font-size:16px;cursor:pointer;color:#5c3d2e;">▶</button>';
  h+='</div>';

  // Day macro summary
  if(eaten.length){
    var dc=0,dp=0,dcb=0,df=0,dany=false;
    eaten.forEach(function(x){
      if(x.type==='eat'){
        var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
        if(!it) return;
        var mm=macroFor(it,x.portions);
        if(mm){dc+=mm.cal;dp+=mm.protein;dcb+=mm.carbs;df+=mm.fat;dany=true;}
      } else if(x.type==='manual'){
        dc+=parseFloat(x.cal||0);
        dp+=parseFloat(x.protein||0);
        dcb+=parseFloat(x.carbs||0);
        df+=parseFloat(x.fat||0);
        dany=true;
      }
    });
    if(dany){
      h+='<div style="background:#ffffff;border:1px solid #d9c9a8;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-around;gap:8px;">';
      [['Cal',Math.round(dc)],['Protein',Math.round(dp)+'g'],['Carbs',Math.round(dcb)+'g'],['Fat',Math.round(df)+'g']].forEach(function(m){

        pf+=parseFloat(x.fat||0);

      h+='<button onclick="confirmCopyEntireDay(\''+sel+'\')" style="background:transparent;border:1px dashed #d9c9a8;color:#5c3d2e;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;margin-bottom:14px;">📋 Copy entire day</button>';
    }
  }

  // Empty state
  if(!dayEntries.length){
    h+='<div style="text-align:center;padding:40px 20px;color:#8a7560;">';
    h+='<div style="font-size:32px;margin-bottom:8px;">📋</div>';
    h+='<div style="font-size:14px;">No activity '+(isToday?'today':(sel>t?'planned for this day':'on this day'))+'</div>';

  // Render an entry row (used for both eaten and other sections)
  function renderRow(x, i, total, allowCopy){
    var icon=x.type==='eat'?'🍽':x.type==='waste'?'🗑':x.type==='deleted'?'❌':x.type==='manual'?'✏️':x.type==='planned'?'📅':'🥡';
    var name, meta;
    if(x.type==='manual'){
      name=x.label||'Untitled';
      var parts=[];
      if(x.cal) parts.push(Math.round(x.cal)+' cal');
      if(x.protein) parts.push(Math.round(x.protein)+'g pro');
      if(x.carbs) parts.push(Math.round(x.carbs)+'g carbs');
      if(x.fat) parts.push(Math.round(x.fat)+'g fat');
      meta='Manual entry'+(parts.length?' · '+parts.join(' · '):'');
    } else {
      var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
      var u=x.unit||(it?unitOf(it):'portions');
      var unitSuffix=u==='portions'?' portion'+(x.portions>1?'s':''):u;
      name=x.itemName;
      meta=x.type==='eat'?'Ate '+x.portions+unitSuffix
        :x.type==='waste'?'Wasted '+x.portions+unitSuffix
        :x.type==='deleted'?'Removed from stock'
        :x.type==='planned'?'Planned · '+x.portions+unitSuffix
        :'Prepped '+x.portions+unitSuffix;
    }
    var copyable=allowCopy && (x.type==='eat'||x.type==='manual') && !!x.hid;
    var rowBorder=i<total-1?'border-bottom:1px solid #eadec5;':'';
    var rowHtml='';
    if(S.historySelectMode && copyable){
      var isSelected=!!S.selectedHids[x.hid];
      rowHtml+='<div onclick="toggleSelectedHid(\''+x.hid+'\')" style="display:flex;align-items:center;gap:12px;padding:10px 0;cursor:pointer;'+rowBorder+'">';
      rowHtml+='<div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(isSelected?'#5c3d2e':'#d9c9a8')+';background:'+(isSelected?'#5c3d2e':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">';
      if(isSelected) rowHtml+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#faf6ef" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      rowHtml+='</div>';
      rowHtml+='<div style="font-size:18px;width:26px;text-align:center;flex-shrink:0;">'+icon+'</div>';
      rowHtml+='<div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;">'+esc(name)+'</div>';
      rowHtml+='<div style="font-size:12px;color:#8a7560;">'+meta+'</div></div>';
      rowHtml+='</div>';
    } else {
      rowHtml+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;'+rowBorder+'">';
      rowHtml+='<div style="font-size:18px;width:26px;text-align:center;flex-shrink:0;">'+icon+'</div>';
      rowHtml+='<div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;">'+esc(name)+'</div>';
      rowHtml+='<div style="font-size:12px;color:#8a7560;">'+meta+'</div></div>';
      if(copyable && !S.historySelectMode){
        if(isToday){
          // From today, single-row copy must let the user pick a destination day
          rowHtml+='<button onclick="event.stopPropagation();confirmCopySingle(\''+x.hid+'\')" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0;">Copy</button>';
        } else {
          // From a past day, single-row copy goes straight to today (fast path)
          rowHtml+='<button onclick="event.stopPropagation();copyEntriesToTodaySingle(\''+x.hid+'\')" style="background:transparent;border:1px solid #d9c9a8;color:#5c3d2e;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0;">Copy</button>';
        }
      }
      rowHtml+='</div>';
    }
    return rowHtml;
  }

  // Eaten section (chronological top-down)
  if(eaten.length){
    h+='<div style="background:#ffffff;border-radius:12px;border:1px solid #d9c9a8;padding:0 14px;margin-bottom:14px;">';
    eaten.forEach(function(x,i){ h+=renderRow(x,i,eaten.length,true); });
    h+='</div>';
  }

  // Planned section (with stock awareness for future days)
  if(plannedEntries.length){
    var sel2=sel;
    var isPastOrToday=sel2<=t;
    h+='<div style="font-size:11px;font-weight:700;color:#5c3d2e;text-transform:uppercase;letter-spacing:0.8px;margin:18px 0 6px;">📅 Planned ('+plannedEntries.length+')</div>';
    h+='<div style="background:#fffbf4;border-radius:12px;border:1px dashed #c8922a;padding:0 14px;margin-bottom:14px;">';
    plannedEntries.forEach(function(x,i){
      var isManualPlan=x.plannedKind==='manual';
      var rowName, rowDetail;
      if(isManualPlan){
        rowName=x.label||'Untitled';
        var parts=[];
        if(x.cal) parts.push(Math.round(x.cal)+' cal');
        if(x.protein) parts.push(Math.round(x.protein)+'g pro');
        if(x.carbs) parts.push(Math.round(x.carbs)+'g carbs');
        if(x.fat) parts.push(Math.round(x.fat)+'g fat');
        rowDetail='Manual plan'+(parts.length?' · '+parts.join(' · '):'');
      } else {
        rowName=x.itemName;
        var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
        var u=x.unit||(it?unitOf(it):'portions');
        var unitSuffix=u==='portions'?(' portion'+(x.portions>1?'s':'')):u;
        var stockNote='';
        if(!it){
          stockNote=' · <span style="color:#a84f2e;">item removed</span>';
        } else if(it.portions<=0){
          stockNote=' · <span style="color:#a84f2e;">no stock</span>';
        } else if(it.portions<x.portions){
          stockNote=' · <span style="color:#c8922a;">only '+it.portions+(u==='portions'?'':u)+' available</span>';
        }
        rowDetail=x.portions+unitSuffix+stockNote;
      }
      h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;'+(i<plannedEntries.length-1?'border-bottom:1px solid #eadec5;':'')+'">';
      h+='<div style="font-size:18px;width:26px;text-align:center;flex-shrink:0;">📅</div>';
      h+='<div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;">'+esc(rowName)+'</div>';
      h+='<div style="font-size:12px;color:#8a7560;">'+rowDetail+'</div></div>';
      // Cancel button always available for plans
      h+='<button onclick="cancelPlannedEntry(\''+x.hid+'\')" style="background:transparent;border:1px solid #d9c9a8;color:#8a7560;border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;flex-shrink:0;">Cancel</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Other activity section (waste / prep / deleted)
  if(other.length){
    h+='<div style="font-size:11px;font-weight:700;color:#8a7560;text-transform:uppercase;letter-spacing:0.8px;margin:18px 0 6px;">Other activity</div>';
    h+='<div style="background:#ffffff;border-radius:12px;border:1px solid #d9c9a8;padding:0 14px;margin-bottom:12px;opacity:0.92;">';
    other.forEach(function(x,i){ h+=renderRow(x,i,other.length,false); });
    h+='</div>';
  }

  return h;
}

// Planned entries: future eat entries that haven't yet been confirmed.
// They live in S.history with type='planned' and don't count toward macros.

// Confirm a single plan: deduct stock if available and convert to a real eat entry,
// OR for manual-kind plans, just convert into a manual entry dated now.
// Returns {confirmed:0|1, partial, missing, noStock}.
function confirmPlannedEntry(hid){
  var plan=S.history.filter(function(x){return x.hid===hid;})[0];
  if(!plan || plan.type!=='planned') return {confirmed:0};
  var nowIso=new Date().toISOString();
  // Manual-kind plans just become regular manual entries, no stock involved
  if(plan.plannedKind==='manual'){
    S.history=S.history.map(function(x){
      if(x.hid!==hid) return x;
      return {
        hid:x.hid,
        type:'manual',
        label:plan.label,
        cal:plan.cal,
        protein:plan.protein,
        carbs:plan.carbs,
        fat:plan.fat,
        date:nowIso
      };
    });
    return {confirmed:1};
  }
  // Otherwise (eat-kind, or legacy plans without plannedKind set)
  var it=S.items.filter(function(x){return x.id===plan.itemId;})[0];
  if(!it){
    // Item is gone — remove the plan and report
    S.history=S.history.filter(function(x){return x.hid!==hid;});
    return {confirmed:0, missing:plan.itemName};
  }
  if(it.portions<=0){
    return {confirmed:0, noStock:plan.itemName};
  }
  var requested=plan.portions;
  var actual=Math.min(requested, it.portions);
  // Deduct stock
  S.items=S.items.map(function(x){
    if(x.id!==it.id) return x;
    return {id:x.id,name:x.name,category:x.category,unit:x.unit,portions:Math.max(0,x.portions-actual),totalPortions:x.totalPortions,expiryDays:x.expiryDays,macros:x.macros,notes:x.notes,prepDate:x.prepDate,lastEaten:nowIso,archived:x.archived};
  });
  // Replace the planned entry with a real eat entry, dated now
  S.history=S.history.map(function(x){
    if(x.hid!==hid) return x;
    return {
      hid:x.hid,
      type:'eat',
      itemId:it.id,
      itemName:it.name,
      portions:actual,
      unit:plan.unit||unitOf(it),
      date:nowIso
    };
  });
  delete S.dismissedAlerts['fgt-'+it.id];
  var partial=null;
  if(actual<requested){ partial={name:plan.itemName, requested:requested, actual:actual, unit:plan.unit||unitOf(it)}; }
  return {confirmed:1, partial:partial};
}

function confirmPlannedEntryUI(hid){
  var r=confirmPlannedEntry(hid);
  save();
  if(r.missing){ alert('Skipped (item removed): '+r.missing); }
  else if(r.noStock){ alert('Cannot confirm — no stock left for: '+r.noStock); }
  else if(r.partial){
    var p=r.partial;
    var sfx=p.unit==='portions'?(' portion'+(p.actual!==1?'s':'')):p.unit;
    var rsfx=p.unit==='portions'?(' portion'+(p.requested!==1?'s':'')):p.unit;
    alert('Partial: '+p.name+' — only '+p.actual+sfx+' available (wanted '+p.requested+rsfx+')');
  }
  render();
}

function cancelPlannedEntry(hid){
  S.history=S.history.filter(function(x){return x.hid!==hid;});
  save();
  render();
}

function confirmAllPlannedToday(){
  var t=todayStr();
  var planned=S.history.filter(function(x){return x.type==='planned' && x.date && x.date.indexOf(t)===0;});
  if(!planned.length) return;
  var result={confirmed:0, partial:[], noStock:[], missing:[]};
  planned.forEach(function(p){
    var r=confirmPlannedEntry(p.hid);
    if(r.confirmed) result.confirmed++;
    if(r.partial) result.partial.push(r.partial);
    if(r.noStock) result.noStock.push(r.noStock);
    if(r.missing) result.missing.push(r.missing);
  });
  save();
  // Build a summary message
  var lines=[];
  if(result.confirmed>0) lines.push(result.confirmed+' plan'+(result.confirmed===1?'':'s')+' confirmed.');
  if(result.partial.length){
    result.partial.forEach(function(p){
      var sfx=p.unit==='portions'?(' portion'+(p.actual!==1?'s':'')):p.unit;
      var rsfx=p.unit==='portions'?(' portion'+(p.requested!==1?'s':'')):p.unit;
      lines.push('Partial: '+p.name+' — only '+p.actual+sfx+' available (wanted '+p.requested+rsfx+')');
    });
  }
  if(result.noStock.length) lines.push('No stock: '+result.noStock.join(', '));
  if(result.missing.length) lines.push('Item removed: '+result.missing.join(', '));
  if(lines.length) alert(lines.join('\n'));
  render();
}

// Calendar modal openers. Mode determines what date selection does:
//   'navigate' — sets S.selectedDate (jumps the History view to that day)
//   'copy-target' — sets S.copyTargetDate then triggers copy execution
function openCalendar(mode){
  var anchor=mode==='copy-target'?todayStr():(S.selectedDate||todayStr());
  S.calMonth=monthStr(anchor);
  S.modal={type:'calendar',mode:mode};
  render();
}

function selectCalendarDate(dateStr){
  if(!S.modal || S.modal.type!=='calendar') return;
  var mode=S.modal.mode;
  if(mode==='navigate'){
    S.selectedDate=dateStr;
    S.historySelectMode=false;
    S.selectedHids={};
    S.modal=null;
    render();
  } else if(mode==='copy-target'){
    S.copyTargetDate=dateStr;
    S.modal=null;
    executePendingCopy();
  } else if(mode==='plan-target'){
    executePendingPlan(dateStr);
  }
}

// Pending copy state — set by copyEntireDay/copySelectedEntries with confirmation flow
var pendingCopy=null;
// Pending plan state — set by planMealForLater with the captured item + portions
var pendingPlan=null;

// Open the calendar in copy-target mode for selecting a future date.
// On selection, creates a 'planned' entry for the held item.
function planMealForLater(){
  if(!S.modal || S.modal.type!=='log') return;
  var it=S.modal.item; if(!it) return;
  var n=parseFloat(S.logPortions); if(!n||n<=0) return;
  pendingPlan={kind:'eat', itemId:it.id, itemName:it.name, portions:n, unit:unitOf(it)};
  S.modal=null;
  S.calMonth=monthStr(todayStr());
  S.modal={type:'calendar',mode:'plan-target'};
  render();
}

function planManualEntryForLater(){
  if(!S.modal || S.modal.type!=='manual-entry') return;
  var f=S.manualForm||{};
  var cal=parseFloat(f.cal)||0;
  var protein=parseFloat(f.protein)||0;
  var carbs=parseFloat(f.carbs)||0;
  var fat=parseFloat(f.fat)||0;
  if(cal<=0 && protein<=0 && carbs<=0 && fat<=0){
    alert('Please enter at least one macro value.');
    return;
  }
  var label=(f.label||'').trim()||'Untitled';
  pendingPlan={kind:'manual', label:label, cal:cal, protein:protein, carbs:carbs, fat:fat};
  S.modal=null;
  S.calMonth=monthStr(todayStr());
  S.modal={type:'calendar',mode:'plan-target'};
  render();
}

function executePendingPlan(dateStr){
  if(!pendingPlan) return;
  var nowIso=dateStr===todayStr() ? new Date().toISOString() : (dateStr+'T12:00:00.000Z');
  var entry;
  if(pendingPlan.kind==='manual'){
    entry={
      hid:newHid(),
      type:'planned',
      plannedKind:'manual',
      label:pendingPlan.label,
      cal:pendingPlan.cal,
      protein:pendingPlan.protein,
      carbs:pendingPlan.carbs,
      fat:pendingPlan.fat,
      date:nowIso
    };
  } else {
    entry={
      hid:newHid(),
      type:'planned',
      plannedKind:'eat',
      itemId:pendingPlan.itemId,
      itemName:pendingPlan.itemName,
      portions:pendingPlan.portions,
      unit:pendingPlan.unit,
      date:nowIso
    };
  }
  S.history.unshift(entry);
  var label=fmtDateLabel(dateStr).toLowerCase();
  pendingPlan=null;
  S.modal=null;
  S.logPortions=1;
  S.manualForm=null;
  save();
  render();
  setTimeout(function(){
    alert('Planned for '+label+'. View it in History or on the day itself to confirm.');
  },50);
}

function confirmCopyEntireDay(dateStr){
  var copyableHids=S.history.filter(function(x){
    if(!x.date || x.date.indexOf(dateStr)!==0) return false;
    return x.type==='eat' || x.type==='manual';
  }).map(function(x){return x.hid;}).filter(Boolean);
  if(!copyableHids.length){ alert('Nothing to copy from this day.'); return; }
  pendingCopy={hids:copyableHids, sourceLabel:fmtDateLabel(dateStr), kind:'entire-day'};
  S.modal={type:'confirm-copy'};
  render();
}

function confirmCopySelected(){
  var hids=Object.keys(S.selectedHids).filter(function(k){return S.selectedHids[k];});
  if(!hids.length){ S.historySelectMode=false; render(); return; }
  pendingCopy={hids:hids, sourceLabel:fmtDateLabel(S.selectedDate||todayStr()), kind:'selected'};
  S.modal={type:'confirm-copy'};
  render();
}

// Single-entry confirm flow (used from "today" rows where direct-copy-to-today doesn't make sense)
function confirmCopySingle(hid){
  var src=S.history.filter(function(x){return x.hid===hid;})[0];
  if(!src) return;
  pendingCopy={hids:[hid], sourceLabel:fmtDateLabel((src.date||'').split('T')[0]||todayStr()), kind:'single'};
  S.modal={type:'confirm-copy'};
  render();
}

function executePendingCopy(){
  if(!pendingCopy) return;
  var dest=S.copyTargetDate||todayStr();
  var result=copyEntriesToDate(pendingCopy.hids, dest);
  pendingCopy=null;
  S.copyTargetDate=null;
  S.historySelectMode=false;
  S.selectedHids={};
  alert(buildCopyResultMessage(result, dest));
  render();
}
