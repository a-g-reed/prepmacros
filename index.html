var S = {
  items:[], history:[], settings:{lowStockThreshold:3,expiryDays:5,forgottenDays:14},

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function daysSince(d){ if(!d)return null; return Math.floor((Date.now()-new Date(d))/86400000); }
function daysAgo(d){ var n=daysSince(d); if(n===null)return null; if(n===0)return'today'; if(n===1)return'yesterday'; return n+'d ago'; }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function barColor(p){ return p>0.5?'#7a9e7e':p>0.25?'#c4a84b':'#b85c38'; }
function isDismissedToday(k){ return S.dismissedAlerts[k]===todayStr(); }
function isArchived(it){ return !!it.archived; }
function activeItems(){ return S.items.filter(function(it){return !isArchived(it);}); }
function totP(){ return activeItems().reduce(function(s,it){return s+it.portions;},0); }
function lowC(){ return activeItems().filter(function(it){return it.portions>0&&it.portions<=S.settings.lowStockThreshold;}).length; }
function outC(){ return activeItems().filter(function(it){return it.portions===0;}).length; }
function archivedC(){ return S.items.filter(isArchived).length; }
function ge(id){ return document.getElementById(id); }
function newHid(){ return 'h'+Date.now()+Math.random().toString(36).slice(2,7); }

// Unit helpers
function unitOf(it){ return it.unit||'portions'; }
function unitLabel(u,n){ if(u==='g')return 'g'; if(u==='ml')return 'ml'; return n===1?'portion':'portions'; }
function unitStep(u){ return u==='portions'?1:10; }
function fmtAmount(n,u){ return n+(u==='portions'?'':u); }
// Calculate macros consumed for n units of item
function macroFor(it,n){
  if(!it.macros||!it.macros.cal)return null;
  var u=unitOf(it);
  // For portions: macros are per-portion, just multiply
  // For g/ml: macros are per-100g/100ml, divide by 100 then multiply
  var divisor=u==='portions'?1:100;
  return {
    cal: parseFloat(it.macros.cal)*n/divisor,
    protein: parseFloat(it.macros.protein||0)*n/divisor,
    carbs: parseFloat(it.macros.carbs||0)*n/divisor,
    fat: parseFloat(it.macros.fat||0)*n/divisor
  };
}

function todayMacros(){
  var t=todayStr(); var cal=0,pro=0,carb=0,fat=0,any=false;
  S.history.filter(function(h){return h.type==='eat'&&h.date&&h.date.indexOf(t)===0;}).forEach(function(h){
    var it=S.items.filter(function(x){return x.id===h.itemId;})[0];
    if(!it)return;
    var m=macroFor(it,h.portions);
    if(m){cal+=m.cal;pro+=m.protein;carb+=m.carbs;fat+=m.fat;any=true;}
  });
  return any?{cal:Math.round(cal),protein:Math.round(pro),carbs:Math.round(carb),fat:Math.round(fat)}:null;
}

function getAlerts(){
  var alerts=[];
  S.items.forEach(function(it){
    if(it.portions===0||isArchived(it))return;
    var expDays=it.expiryDays!=null?it.expiryDays:S.settings.expiryDays;
    var age=daysSince(it.prepDate);
    if(expDays&&age!==null){
      if(age>=expDays&&!isDismissedToday('exp-'+it.id)) alerts.push({key:'exp-'+it.id,type:'expired',item:it,msg:esc(it.name)+' may have expired',badge:age+'d old',col:'#b85c38'});
      else if(age>=expDays-1&&age<expDays&&!isDismissedToday('expw-'+it.id)) alerts.push({key:'expw-'+it.id,type:'expiring',item:it,msg:esc(it.name)+' expires tomorrow',badge:'1d left',col:'#c4a84b'});
    }
    var sinceEat=daysSince(it.lastEaten||it.prepDate);
    if(sinceEat!==null&&sinceEat>=S.settings.forgottenDays&&!isDismissedToday('fgt-'+it.id))
      alerts.push({key:'fgt-'+it.id,type:'forgotten',item:it,msg:"Haven't eaten "+esc(it.name),badge:sinceEat+'d',col:'#6050a0'});
  });
  return alerts;
}

// ── Storage ───────────────────────────────────────────────────────────────────
function localSave(){
  try{localStorage.setItem(LOCAL_KEY,JSON.stringify({items:S.items,history:S.history,settings:S.settings,dismissedAlerts:S.dismissedAlerts}));}catch(e){}
}
function localLoad(){
  try{var r=localStorage.getItem(LOCAL_KEY);if(r){var p=JSON.parse(r);S.items=p.items||[];S.history=p.history||[];if(p.settings)for(var k in p.settings)S.settings[k]=p.settings[k];S.dismissedAlerts=p.dismissedAlerts||{};}}catch(e){}
}

var saveTimer=null;
function save(){
  localSave();
  S.syncStatus='syncing'; S.syncMsg='Syncing\u2026';
  updateSyncBar();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    fetch(SB_URL+'/rest/v1/prepmacros_data?id=eq.singleton',{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({items:S.items,history:S.history,settings:S.settings,dismissed_alerts:S.dismissedAlerts,updated_at:new Date().toISOString()})
    }).then(function(){S.syncStatus='synced';S.syncMsg='Saved to cloud';updateSyncBar();})
      .catch(function(e){S.syncStatus='error';S.syncMsg='Offline \u2013 saved locally';updateSyncBar();});
  },800);
}

function updateSyncBar(){
  var bar=ge('sync-bar');
  if(!bar)return;
  var dotColor=S.syncStatus==='synced'?'#7a9e7e':S.syncStatus==='error'?'#b85c38':'#c8a96e';
  var bgColor=S.syncStatus==='synced'?'rgba(122,158,126,0.15)':S.syncStatus==='error'?'rgba(184,92,56,0.15)':'rgba(200,169,110,0.2)';
  bar.style.background=bgColor;
  bar.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+dotColor+';margin-right:6px;vertical-align:middle;'+(S.syncStatus==='syncing'?'animation:pulse 1s infinite;':'')+'"></span><span style="font-size:11px;color:'+dotColor+';">'+S.syncMsg+'</span>';
}

// ── Actions ───────────────────────────────────────────────────────────────────
function addItem(){
  var f=S.form;
  if(!f.name.trim()||!f.portions)return;
  var unit=f.unit||'portions';
  var item={id:Date.now().toString(),name:f.name.trim(),category:f.category,unit:unit,portions:parseFloat(f.portions),totalPortions:parseFloat(f.portions),
    expiryDays:f.expiryDays?parseInt(f.expiryDays):null,
    macros:{cal:f.cal,protein:f.protein,carbs:f.carbs,fat:f.fat},notes:f.notes,prepDate:new Date().toISOString(),lastEaten:null};
  S.items.push(item);
  S.history.unshift({hid:newHid(),type:'prep',itemId:item.id,itemName:item.name,portions:item.portions,unit:unit,date:new Date().toISOString()});
  save(); S.form={name:'',category:'Protein',unit:'portions',portions:'',expiryDays:'',cal:'',protein:'',carbs:'',fat:'',notes:''}; S.view='stock'; render();
}

function restockItem(){
  var n=parseFloat(S.restockPortions); if(!n||!S.modal)return;
  var id=S.modal.item.id;
  var u=unitOf(S.modal.item);
  S.items=S.items.map(function(it){return it.id===id?{id:it.id,name:it.name,category:it.category,unit:it.unit,portions:it.portions+n,totalPortions:it.totalPortions+n,expiryDays:it.expiryDays,macros:it.macros,notes:it.notes,prepDate:new Date().toISOString(),lastEaten:it.lastEaten,archived:false}:it;});
  S.history.unshift({hid:newHid(),type:'prep',itemId:id,itemName:S.modal.item.name,portions:n,unit:u,date:new Date().toISOString()});
  ['exp','expw','fgt'].forEach(function(p){delete S.dismissedAlerts[p+'-'+id];});
  save(); S.modal=null; S.restockPortions=1; render();
}

function logMeal(){
  if(!S.modal)return;
  var n=Math.min(S.logPortions,S.modal.item.portions); var id=S.modal.item.id;
  var u=unitOf(S.modal.item);
  S.items=S.items.map(function(it){return it.id===id?{id:it.id,name:it.name,category:it.category,unit:it.unit,portions:Math.max(0,it.portions-n),totalPortions:it.totalPortions,expiryDays:it.expiryDays,macros:it.macros,notes:it.notes,prepDate:it.prepDate,lastEaten:new Date().toISOString(),archived:it.archived}:it;});
  S.history.unshift({hid:newHid(),type:'eat',itemId:id,itemName:S.modal.item.name,portions:n,unit:u,date:new Date().toISOString()});
  delete S.dismissedAlerts['fgt-'+id];
  save(); S.modal=null; S.logPortions=1; render();
}

function removeItem(id){
  var it=S.items.filter(function(x){return x.id===id;})[0];
  if(it)S.history.unshift({hid:newHid(),type:'deleted',itemId:id,itemName:it.name,portions:it.portions,unit:unitOf(it),date:new Date().toISOString()});
  S.items=S.items.filter(function(x){return x.id!==id;}); S.modal=null; save(); render();
}

function toggleArchive(id){
  S.items=S.items.map(function(it){
    if(it.id!==id)return it;
    return {id:it.id,name:it.name,category:it.category,unit:it.unit,portions:it.portions,totalPortions:it.totalPortions,expiryDays:it.expiryDays,macros:it.macros,notes:it.notes,prepDate:it.prepDate,lastEaten:it.lastEaten,archived:!isArchived(it)};
  });
  save(); render();
}

// History entry editing (Today tab)
function openHistoryEdit(hid){
  var entry=S.history.filter(function(x){return x.hid===hid;})[0]; if(!entry)return;
  S.modal={type:'edit-history',entry:entry};
  S.histEditAmount=entry.portions;
  render();
}

function saveHistoryEdit(hid){
  var entry=S.history.filter(function(x){return x.hid===hid;})[0]; if(!entry)return;
  var newAmt=parseFloat(S.histEditAmount);
  if(isNaN(newAmt)||newAmt<=0){S.modal=null;render();return;}
  var delta=newAmt-entry.portions;
  // Adjust stock accordingly
  var it=S.items.filter(function(x){return x.id===entry.itemId;})[0];
  if(it){
    var stockDelta=0;
    if(entry.type==='eat'||entry.type==='waste') stockDelta=-delta; // eating/wasting MORE means less stock
    else if(entry.type==='prep') stockDelta=delta; // prepping more means more stock
    S.items=S.items.map(function(x){
      if(x.id!==it.id) return x;
      return {id:x.id,name:x.name,category:x.category,unit:x.unit,portions:Math.max(0,x.portions+stockDelta),totalPortions:Math.max(x.totalPortions,x.portions+stockDelta),expiryDays:x.expiryDays,macros:x.macros,notes:x.notes,prepDate:x.prepDate,lastEaten:x.lastEaten,archived:x.archived};
    });
  }
  // Update the history entry
  S.history=S.history.map(function(x){
    if(x.hid!==hid) return x;
    var copy={}; for(var k in x) copy[k]=x[k];
    copy.portions=newAmt;
    copy.edited=true;
    return copy;
  });
  save();S.modal=null;S.histEditAmount=0;render();
}

function deleteHistoryEntry(hid){
  var entry=S.history.filter(function(x){return x.hid===hid;})[0]; if(!entry)return;
  // Reverse the effect on stock
  var it=S.items.filter(function(x){return x.id===entry.itemId;})[0];
  if(it){
    var stockDelta=0;
    if(entry.type==='eat'||entry.type==='waste') stockDelta=entry.portions; // undo eat: add back
    else if(entry.type==='prep') stockDelta=-entry.portions; // undo prep: subtract
    S.items=S.items.map(function(x){
      if(x.id!==it.id) return x;
      return {id:x.id,name:x.name,category:x.category,unit:x.unit,portions:Math.max(0,x.portions+stockDelta),totalPortions:x.totalPortions,expiryDays:x.expiryDays,macros:x.macros,notes:x.notes,prepDate:x.prepDate,lastEaten:x.lastEaten,archived:x.archived};
    });
  }
  S.history=S.history.filter(function(x){return x.hid!==hid;});
  save();S.modal=null;render();
}

function openArchiveConfirm(id){
  var it=S.items.filter(function(x){return x.id===id;})[0]; if(!it)return;
  S.modal={type:'confirm-archive',item:it};
  render();
}

function confirmArchive(id){
  toggleArchive(id);
  S.modal=null;
  S.editForm=null;
  render();
}

function openEdit(id){
  var it=S.items.filter(function(x){return x.id===id;})[0]; if(!it)return;
  S.editForm={id:id,name:it.name,category:it.category,unit:unitOf(it),expiryDays:it.expiryDays||'',
    cal:(it.macros&&it.macros.cal)||'',protein:(it.macros&&it.macros.protein)||'',
    carbs:(it.macros&&it.macros.carbs)||'',fat:(it.macros&&it.macros.fat)||'',notes:it.notes||''};
  S.modal={type:'edit',item:it}; render();
}

function saveEdit(){
  var f=S.editForm; if(!f)return;
  S.items=S.items.map(function(it){
    if(it.id!==f.id)return it;
    return {id:it.id,name:f.name.trim()||it.name,category:f.category,unit:f.unit||it.unit||'portions',portions:it.portions,totalPortions:it.totalPortions,
      expiryDays:f.expiryDays?parseInt(f.expiryDays):null,macros:{cal:f.cal,protein:f.protein,carbs:f.carbs,fat:f.fat},
      notes:f.notes,prepDate:it.prepDate,lastEaten:it.lastEaten,archived:it.archived};
  });
  save(); S.modal=null; S.editForm=null; render();
}

function wastePortions(){
  if(!S.modal)return;
  var n=Math.min(S.wastePortions,S.modal.item.portions); var id=S.modal.item.id;
  var u=unitOf(S.modal.item);
  var wasAll=S.modal.item.portions-n<=0;
  S.items=S.items.map(function(it){return it.id===id?{id:it.id,name:it.name,category:it.category,unit:it.unit,portions:Math.max(0,it.portions-n),totalPortions:it.totalPortions,expiryDays:it.expiryDays,macros:it.macros,notes:it.notes,prepDate:it.prepDate,lastEaten:it.lastEaten,archived:it.archived}:it;});
  S.history.unshift({hid:newHid(),type:'waste',itemId:id,itemName:S.modal.item.name,portions:n,unit:u,date:new Date().toISOString()});
  if(wasAll)S.items=S.items.filter(function(it){return it.id!==id;});
  save(); S.modal=null; S.wastePortions=1; render();
}

function saveSettings(){
  var g=function(id,fb){var e=ge(id);return e?parseInt(e.value)||fb:fb;};
  S.settings.lowStockThreshold=g('s-low',3); S.settings.expiryDays=g('s-exp',5); S.settings.forgottenDays=g('s-fgt',14);
  save(); render();
}

function exportData(){
  var blob=new Blob([JSON.stringify({items:S.items,history:S.history,settings:S.settings},null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='prepmacros-'+todayStr()+'.json'; a.click();
}

function importData(file){
  var r=new FileReader(); r.onload=function(e){
    try{var p=JSON.parse(e.target.result);
      if(p.items){S.items=p.items;S.history=p.history||[];if(p.settings)for(var k in p.settings)S.settings[k]=p.settings[k];save();render();alert('Import successful!');}
      else alert('Invalid file.');
    }catch(ex){alert('Could not read file.');}
  }; r.readAsText(file);
}

};

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  var app=ge('app'); if(!app)return;
  var safeTop='max(env(safe-area-inset-top),12px)';
  var safeBot='calc(env(safe-area-inset-bottom) + 20px)';

  var macros=todayMacros(); var alerts=getAlerts(); var low=lowC(); var out=outC();

  // ── Header
  var header='<div style="background:#3d2b1a;padding:'+safeTop+' 20px 0;position:sticky;top:0;z-index:100;">';

  // Sync bar
  var dotColor=S.syncStatus==='synced'?'#7a9e7e':S.syncStatus==='error'?'#b85c38':'#c8a96e';
  var bgColor=S.syncStatus==='synced'?'rgba(122,158,126,0.15)':S.syncStatus==='error'?'rgba(184,92,56,0.15)':'rgba(200,169,110,0.2)';
  header+='<div id="sync-bar" style="background:'+bgColor+';padding:3px 0;text-align:center;">';
  header+='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+dotColor+';margin-right:6px;vertical-align:middle;'+(S.syncStatus==='syncing'?'animation:pulse 1s infinite;':'')+'"></span>';
  header+='<span style="font-size:11px;color:'+dotColor+';">'+S.syncMsg+'</span></div>';

  // Title row
  header+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px;">';
  header+='<div><div style="font-size:20px;font-weight:700;color:#f0d9b5;">PrepMacros</div><div style="font-size:10px;color:#c8a96e;letter-spacing:1.5px;text-transform:uppercase;">Stock Tracker</div></div>';
  header+='<div style="display:flex;gap:6px;">';
  if(macros) header+='<div style="background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 10px;text-align:center;"><div style="font-size:14px;font-weight:700;color:#c8a96e;">'+macros.cal+'</div><div style="font-size:9px;color:#c8b89a;text-transform:uppercase;">Cal today</div></div>';
  if(low)header+='<button onclick="jumpToLowStock()" style="background:rgba(255,255,255,0.1);border:none;border-radius:20px;padding:4px 10px;text-align:center;cursor:pointer;"><div style="font-size:14px;font-weight:700;color:#d4a843;">'+low+'</div><div style="font-size:9px;color:#c8b89a;text-transform:uppercase;">Low</div></button>';
  if(out)header+='<button onclick="jumpToOutStock()" style="background:rgba(255,255,255,0.1);border:none;border-radius:20px;padding:4px 10px;text-align:center;cursor:pointer;"><div style="font-size:14px;font-weight:700;color:#b85c38;">'+out+'</div><div style="font-size:9px;color:#c8b89a;text-transform:uppercase;">Out</div></button>';
  if(alerts.length)header+='<div style="background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 10px;text-align:center;"><div style="font-size:14px;font-weight:700;color:#e0a030;">'+alerts.length+'</div><div style="font-size:9px;color:#c8b89a;text-transform:uppercase;">Alerts</div></div>';
  header+='</div></div>';

  // Today strip
  if(macros){
    header+='<div style="background:rgba(200,169,110,0.15);border-top:1px solid rgba(200,169,110,0.2);padding:8px 0;display:flex;gap:16px;overflow-x:auto;">';
    header+='<span style="font-size:11px;color:#c8b89a;align-self:center;text-transform:uppercase;letter-spacing:0.5px;border-right:1px solid rgba(200,169,110,0.3);padding-right:14px;white-space:nowrap;">Today</span>';
    var mm=[['Protein',macros.protein+'g'],['Carbs',macros.carbs+'g'],['Fat',macros.fat+'g']];
    mm.forEach(function(m){
      header+='<div style="text-align:center;flex-shrink:0;"><div style="font-size:15px;font-weight:700;color:#f0d9b5;">'+m[1]+'</div><div style="font-size:9px;color:#c8b89a;text-transform:uppercase;">'+m[0]+'</div></div>';
    });
    header+='</div>';
  }

  // Alerts banner
  if(alerts.length){
    header+='<div style="background:#fdf6e3;border-top:1px solid rgba(200,160,60,0.25);padding:6px 16px;">';
    alerts.forEach(function(a){
      header+='<div style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.05);">';
      header+='<div style="flex:1;font-size:13px;color:#5a4010;">'+a.msg+'</div>';
      header+='<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+a.col+'22;color:'+a.col+';margin-left:8px;">'+a.badge+'</span>';
      header+='<button onclick="dismissAlert(\''+a.key+'\')" style="background:none;border:none;font-size:15px;color:#b09050;cursor:pointer;padding:0 2px 0 8px;">&#x2715;</button>';
      header+='</div>';
    });
    header+='</div>';
  }

  // Nav
  header+='<div style="display:flex;gap:4px;padding:8px 0 10px;">';
  var navItems=[['stock','📦'],['add','+ Add'],['log','🍽 Log'],['today','📅 Today'],['history','📋'],['settings','⚙️']];
  navItems.forEach(function(v){
    var active=S.view===v[0];
    header+='<button onclick="setView(\''+v[0]+'\')" style="flex:1;padding:7px 2px;border-radius:8px;border:none;font-size:11px;cursor:pointer;background:'+(active?'#c8a96e':'rgba(255,255,255,0.08)')+';color:'+(active?'#3d2b1a':'#d4c4a8')+';font-weight:'+(active?'700':'400')+';">'+v[1]+'</button>';
  });
  header+='</div></div>';

  // ── Main content
  var main='<div style="flex:1;overflow-y:auto;padding:16px 16px '+safeBot+';-webkit-overflow-scrolling:touch;">';
  if(S.view==='stock') main+=renderStock();
  else if(S.view==='add') main+=renderAdd();
  else if(S.view==='log') main+=renderLog();
  else if(S.view==='today') main+=renderToday();
  else if(S.view==='history') main+=renderHistory();
  else if(S.view==='settings') main+=renderSettings();
  main+='</div>';

  // ── Modal
  var modal=S.modal?renderModal():'';

  app.style.cssText='min-height:100vh;display:flex;flex-direction:column;';
  app.innerHTML=header+main+modal;
}

function setView(v){
  // Clear the stock filter when moving away from stock view
  if(v!=='stock') S.stockFilter='all';
  S.view=v;
  render();
}
function jumpToLowStock(){ S.stockFilter='low'; S.view='stock'; S.filterCat='All'; render(); }
function jumpToOutStock(){ S.stockFilter='out'; S.view='stock'; S.filterCat='All'; render(); }
function dismissAlert(key){ S.dismissedAlerts[key]=todayStr(); save(); render(); }
function toggleExpand(id){ S.expandedId=S.expandedId===id?null:id; render(); }

// ── Stock view
function renderStock(){
  // Archived items are never shown in stock unless the showArchived toggle is on
  var baseItems=S.showArchived?S.items.filter(isArchived):S.items.filter(function(it){return !isArchived(it);});

  // Apply category filter
  var items=S.filterCat==='All'?baseItems:baseItems.filter(function(it){return it.category===S.filterCat;});

  // Apply stock filter (from Low/Out badge tap)
  if(!S.showArchived){
    if(S.stockFilter==='low') items=items.filter(function(it){return it.portions>0&&it.portions<=S.settings.lowStockThreshold;});
    else if(S.stockFilter==='out') items=items.filter(function(it){return it.portions===0;});
  }

  // Sort by user-defined order (falls back to original sequence for items with no order field yet)
  items.sort(function(a,b){
    var ao=typeof a.order==='number'?a.order:9999;
    var bo=typeof b.order==='number'?b.order:9999;
    return ao-bo;
  });

  var h='';

  // Archived banner + toggle
  var archCount=archivedC();
  if(S.showArchived){
    h+='<div style="background:#f0e6d4;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">';
    h+='<div style="font-size:13px;color:#5a3e2a;"><strong>Viewing archived</strong> ('+archCount+' item'+(archCount!==1?'s':'')+')</div>';
    h+='<button onclick="S.showArchived=false;render();" style="background:#3d2b1a;color:#f0d9b5;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Back to stock</button>';
    h+='</div>';
  }

  // Stock filter banner (when viewing low/out via badge tap)
  if(!S.showArchived && S.stockFilter!=='all'){
    var label=S.stockFilter==='low'?'Showing low-stock items':'Showing out-of-stock items';
    h+='<div style="background:#fdf6e3;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">';
    h+='<div style="font-size:13px;color:#5a4010;">'+label+'</div>';
    h+='<button onclick="S.stockFilter=\'all\';render();" style="background:transparent;border:1px solid #c8b89a;color:#5a4010;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Show all</button>';
    h+='</div>';
  }

  // Category filter pills (only shown when not viewing archived and no stock filter)
  if(!S.showArchived && S.stockFilter==='all' && !S.reorderMode){
    h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;">';
    CATS.forEach(function(c){
      var active=S.filterCat===c;
      var count=c==='All'?activeItems().length:activeItems().filter(function(it){return it.category===c;}).length;
      var badgeBg=active?'rgba(240,217,181,0.25)':'#f0e6d4';
      var badgeColor=active?'#f0d9b5':'#7a5c3a';
      var badge=count>0?'<span style="background:'+badgeBg+';border-radius:10px;padding:1px 7px;margin-left:6px;font-size:11px;font-weight:700;color:'+badgeColor+';">'+count+'</span>':'';
      h+='<button onclick="S.filterCat=\''+c+'\';render();" style="padding:5px 12px;border-radius:20px;white-space:nowrap;font-size:12px;border:'+(active?'none':'1px solid #e8ddd0')+';background:'+(active?'#3d2b1a':'transparent')+';color:'+(active?'#f0d9b5':'#7a5c3a')+';display:inline-flex;align-items:center;">'+c+badge+'</button>';
    });
    h+='</div>';
  }

  // Reorder mode banner
  if(S.reorderMode){
    h+='<div style="background:#f0e6d4;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">';
    h+='<div style="font-size:13px;color:#5a3e2a;"><strong>Reorder mode</strong> — drag the ≡ handle to rearrange</div>';
    h+='<button onclick="exitReorderMode()" style="background:#3d2b1a;color:#f0d9b5;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Done</button>';
    h+='</div>';
  }

  if(!items.length){
    h+='<div style="text-align:center;padding:48px 20px;color:#a08060;">';
    h+='<div style="font-size:40px;margin-bottom:12px;">'+(S.showArchived?'📦':'🥡')+'</div>';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:6px;color:#7a5c3a;">'+(S.showArchived?'No archived items':(S.stockFilter==='low'?'Nothing low':(S.stockFilter==='out'?'Nothing out of stock':'No items yet')))+'</div>';
    if(!S.showArchived && S.stockFilter==='all') h+='<div style="font-size:13px;">Tap &quot;+ Add&quot; to log your first prep batch</div>';
    h+='</div>';
  } else if(S.reorderMode){
    h+='<div id="reorder-list">';
    items.forEach(function(it){ h+=renderReorderCard(it); });
    h+='</div>';
  } else {
    items.forEach(function(it){ h+=renderCard(it); });
  }

  // Archive access footer + Reorder toggle (only on default stock view)
  if(!S.showArchived && S.stockFilter==='all' && !S.reorderMode){
    h+='<div style="display:flex;gap:8px;margin-top:16px;">';
    if(items.length>1) h+='<button onclick="enterReorderMode()" style="flex:1;background:transparent;border:1px dashed #c8b89a;color:#7a5c3a;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;">↕ Reorder</button>';
    if(archCount>0) h+='<button onclick="S.showArchived=true;S.expandedId=null;render();" style="flex:1;background:transparent;border:1px dashed #c8b89a;color:#7a5c3a;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;">📁 Archived ('+archCount+')</button>';
    h+='</div>';
  }

  return h;
}

function renderCard(it){
  var pct=it.totalPortions>0?it.portions/it.totalPortions:0;
  var exp=S.expandedId===it.id, oos=it.portions===0;
  var isLow=it.portions>0&&it.portions<=S.settings.lowStockThreshold;
  var expDays=it.expiryDays!=null?it.expiryDays:S.settings.expiryDays;
  var age=daysSince(it.prepDate);
  var isExp=!!(expDays&&age>=expDays), isExpW=!isExp&&!!(expDays&&age>=expDays-1);
  var sinceEat=daysSince(it.lastEaten||it.prepDate), isFgt=sinceEat>=S.settings.forgottenDays;
  var borderColor=isExp?'#b85c38':isExpW||isLow?'#c4a84b':'#e0d0ba';
  var portColor=oos?'#b85c38':isLow?'#c4a84b':'#3d2b1a';

  var h='<div style="background:#fff8f0;border-radius:14px;border:1.5px solid '+borderColor+';overflow:hidden;margin-bottom:10px;">';

  // Header row (tappable)
  h+='<div onclick="toggleExpand(\''+it.id+'\')" style="padding:14px 16px;cursor:pointer;">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
  h+='<div style="flex:1;min-width:0;">';
  h+='<div style="font-weight:700;font-size:16px;">'+esc(it.name)+'</div>';
  h+='<div style="font-size:11px;color:#a08060;margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">';
  h+='<span style="background:#f0e6d4;border-radius:10px;padding:2px 8px;color:#7a5c3a;">'+esc(it.category)+'</span>';
  if(isExp) h+='<span style="background:#ffe8e0;border-radius:10px;padding:2px 8px;color:#8a2010;">⚠️ Expired</span>';
  else if(isExpW) h+='<span style="background:#fff0cc;border-radius:10px;padding:2px 8px;color:#8a6010;">🕐 Exp. soon</span>';
  else h+='<span>prepped '+(daysAgo(it.prepDate)||'—')+'</span>';
  if(isLow&&!oos) h+='<span style="background:#fff0cc;border-radius:10px;padding:2px 8px;color:#8a6010;">⚡ Low</span>';
  if(isFgt&&!oos) h+='<span style="background:#ece8f8;border-radius:10px;padding:2px 8px;color:#6050a0;">💤 Forgotten</span>';
  if(it.lastEaten) h+='<span>eaten '+daysAgo(it.lastEaten)+'</span>';
  h+='</div></div>';
  h+='<div style="text-align:right;flex-shrink:0;margin-left:10px;">';
  var u=unitOf(it);
  var displayNum=u==='portions'?it.portions:it.portions;
  var displayLbl=u==='portions'?'portions':u;
  h+='<div style="font-size:24px;font-weight:700;line-height:1;color:'+portColor+';">'+displayNum+'</div>';
  h+='<div style="font-size:10px;color:#a08060;">'+displayLbl+'</div></div></div>';
  // Progress bar
  h+='<div style="background:#e8ddd0;border-radius:4px;height:5px;margin-top:10px;">';
  h+='<div style="width:'+Math.max(2,pct*100)+'%;height:100%;border-radius:4px;background:'+barColor(pct)+';"></div></div>';
  h+='</div>'; // end header

  if(exp){
    h+='<div style="padding:0 16px 14px;border-top:1px solid #f0e6d4;">';
    if(it.macros&&it.macros.cal){
      var u=unitOf(it);
      var macroLabel=u==='portions'?'Per portion':'Per 100'+u;
      h+='<div style="font-size:11px;color:#a08060;margin-top:12px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">'+macroLabel+'</div>';
      h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;">';
      [['Cal',it.macros.cal],['Protein',it.macros.protein+'g'],['Carbs',it.macros.carbs+'g'],['Fat',it.macros.fat+'g']].forEach(function(m){
        h+='<div style="background:#f0e6d4;border-radius:8px;padding:6px 4px;text-align:center;">';
        h+='<div style="font-size:13px;font-weight:700;">'+m[1]+'</div>';
        h+='<div style="font-size:10px;color:#a08060;">'+m[0]+'</div></div>';
      });
      h+='</div>';
    }
    if(it.notes) h+='<div style="font-size:12px;color:#7a5c3a;margin-bottom:10px;font-style:italic;">&quot;'+esc(it.notes)+'&quot;</div>';
    if(expDays&&!isArchived(it)) h+='<div style="font-size:12px;color:#a08060;margin-bottom:10px;">Expiry: '+expDays+' days &middot; '+(isExp?'<span style="color:#b85c38;font-weight:700;">Expired</span>':(expDays-age)+'d remaining')+'</div>';

    if(isArchived(it)){
      // Archived items get a simpler action row
      h+='<div style="display:flex;gap:8px;">';
      h+='<button onclick="openArchiveConfirm(\''+it.id+'\')" style="'+cs.btnPrimary+'flex:1;">📤 Unarchive</button>';
      h+='<button onclick="openEdit(\''+it.id+'\')" style="'+cs.btnSecondary+'padding:8px 10px;">✏️</button>';
      h+='<button onclick="openRemoveModal(\''+it.id+'\')" style="'+cs.btnDanger+'">✕</button>';
      h+='</div>';
    } else {
      h+='<div style="display:flex;gap:8px;">';
      h+='<button onclick="openLogModal(\''+it.id+'\')" '+(oos?'disabled':'')+' style="'+cs.btnPrimary+'flex:1;opacity:'+(oos?0.4:1)+';">🍽 Eat</button>';
      h+='<button onclick="openRestockModal(\''+it.id+'\')" style="'+cs.btnSecondary+'flex:1;">🥡 Restock</button>';
      h+='<button onclick="openWasteModal(\''+it.id+'\')" '+(oos?'disabled':'')+' style="'+cs.btnSecondary+'flex:1;opacity:'+(oos?0.4:1)+';">🗑 Waste</button>';
      h+='<button onclick="openEdit(\''+it.id+'\')" style="'+cs.btnSecondary+'padding:8px 10px;">✏️</button>';
      h+='<button onclick="openRemoveModal(\''+it.id+'\')" style="'+cs.btnDanger+'">✕</button>';
      h+='</div>';
    }
    h+='</div>';
  }

  h+='</div>';
  return h;
}

function openLogModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it&&it.portions>0){S.modal={type:'log',item:it};S.logPortions=unitStep(unitOf(it));render();} }
function openRestockModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it){S.modal={type:'restock',item:it};S.restockPortions=unitStep(unitOf(it));render();} }
function openWasteModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it&&it.portions>0){S.modal={type:'waste',item:it};S.wastePortions=unitStep(unitOf(it));render();} }
function openRemoveModal(id){ var it=S.items.filter(function(x){return x.id===id;})[0]; if(it){S.modal={type:'confirm-remove',item:it};render();} }

// Reorder mode helpers
function enterReorderMode(){
  // Assign initial order values for items that don't have one yet, preserving current visual order
  var visible=S.items.filter(function(it){return !isArchived(it);});
  visible.sort(function(a,b){
    var ao=typeof a.order==='number'?a.order:9999;
    var bo=typeof b.order==='number'?b.order:9999;
    return ao-bo;
  });
  visible.forEach(function(it,i){ it.order=i; });
  S.reorderMode=true;
  S.expandedId=null;
  render();
}

function exitReorderMode(){
  S.reorderMode=false;
  save();
  render();
}

function moveItem(id,direction){
  // Get current ordered list of active items
  var visible=S.items.filter(function(it){return !isArchived(it);});
  visible.sort(function(a,b){
    var ao=typeof a.order==='number'?a.order:9999;
    var bo=typeof b.order==='number'?b.order:9999;
    return ao-bo;
  });
  var idx=-1;
  for(var i=0;i<visible.length;i++){ if(visible[i].id===id){idx=i;break;} }
  if(idx<0) return;
  var newIdx=idx+direction;
  if(newIdx<0||newIdx>=visible.length) return;
  // Swap
  var tmp=visible[idx]; visible[idx]=visible[newIdx]; visible[newIdx]=tmp;
  // Reassign order values
  visible.forEach(function(it,i){ it.order=i; });
  render();
}

function renderReorderCard(it){
  var u=unitOf(it);
  var h='<div style="background:#fff8f0;border:1px solid #e0d0ba;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;">';
  h+='<div style="font-size:22px;color:#a08060;line-height:1;">≡</div>';
  h+='<div style="flex:1;min-width:0;">';
  h+='<div style="font-weight:700;font-size:15px;">'+esc(it.name)+'</div>';
  h+='<div style="font-size:12px;color:#a08060;">'+esc(it.category)+' · '+it.portions+(u==='portions'?' portions':u)+'</div>';
  h+='</div>';
  h+='<button onclick="moveItem(\''+it.id+'\',-1)" style="width:36px;height:36px;border-radius:8px;border:1px solid #c8b89a;background:transparent;font-size:16px;cursor:pointer;flex-shrink:0;">▲</button>';
  h+='<button onclick="moveItem(\''+it.id+'\',1)" style="width:36px;height:36px;border-radius:8px;border:1px solid #c8b89a;background:transparent;font-size:16px;cursor:pointer;flex-shrink:0;">▼</button>';
  h+='</div>';
  return h;
}

// ── Add view
function renderAdd(){
  var f=S.form;
  var u=f.unit||'portions';
  var amountLabel=u==='portions'?'Portions prepped':'Amount prepped ('+u+')';
  var macroLabel=u==='portions'?'Macros per portion':'Macros per 100'+u;
  var h='<div style="font-size:22px;font-weight:700;margin-bottom:18px;">Log a Prep Session</div>';

  h+='<div><label style="'+cs.label+'">Category</label><select id="f-cat" style="'+cs.input+'">';
  CATS.filter(function(c){return c!=='All';}).forEach(function(c){h+='<option'+(f.category===c?' selected':'')+'>'+c+'</option>';});
  h+='</select></div>';
  h+='<div><label style="'+cs.label+'">Measured in</label><select id="f-unit" onchange="S.form.unit=this.value;collectAddForm();render();" style="'+cs.input+'">';
  [['portions','Portions'],['g','Grams (g)'],['ml','Millilitres (ml)']].forEach(function(opt){
    h+='<option value="'+opt[0]+'"'+(u===opt[0]?' selected':'')+'>'+opt[1]+'</option>';
  });
  h+='</select></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  h+='<div><label style="'+cs.label+'">'+amountLabel+'</label><input id="f-portions" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(f.portions)+'" placeholder="'+(u==='portions'?'e.g. 12':'e.g. 500')+'" min="1" /></div>';
  h+='<div><label style="'+cs.label+'">Expires after (days)</label><input id="f-expiry" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(f.expiryDays)+'" placeholder="default: '+S.settings.expiryDays+'" min="1" /></div>';
  h+='</div>';
  h+='<div style="font-size:15px;font-weight:700;margin:18px 0 2px;color:#5a3e2a;">'+macroLabel+' <span style="font-size:12px;color:#a08060;font-weight:400;">(optional)</span></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  [['f-cal','Calories',f.cal],['f-protein','Protein (g)',f.protein],['f-carbs','Carbs (g)',f.carbs],['f-fat','Fat (g)',f.fat]].forEach(function(m){
    h+='<div><label style="'+cs.label+'">'+m[1]+'</label><input id="'+m[0]+'" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(m[2])+'" placeholder="0" min="0" /></div>';
  });
  h+='</div>';
  h+='<label style="'+cs.label+'">Notes</label>';
  h+='<input id="f-notes" style="'+cs.input+'" value="'+esc(f.notes)+'" placeholder="e.g. made with thighs, extra spicy" />';

// ── Log view
function renderLog(){
  var avail=S.items.filter(function(it){return it.portions>0 && !isArchived(it);});
  // Apply category filter (reuse S.filterCat, shared with Stock view)
  var filtered=S.filterCat==='All'?avail:avail.filter(function(it){return it.category===S.filterCat;});
  // Sort by most stock first (using portion/totalPortion ratio for cross-unit fairness, fall back to raw portions)
  filtered.sort(function(a,b){
    var ra=a.totalPortions>0?a.portions/a.totalPortions:a.portions;
    var rb=b.totalPortions>0?b.portions/b.totalPortions:b.portions;
    if(rb!==ra) return rb-ra;
    return b.portions-a.portions;
  });
  var h='<div style="font-size:22px;font-weight:700;margin-bottom:6px;">Log a Meal</div>';
  h+='<div style="color:#7a5c3a;font-size:13px;margin-bottom:16px;">Tap an item to deduct from stock</div>';

  // Category filter pills
  if(avail.length){
    h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;">';
    CATS.forEach(function(c){
      var active=S.filterCat===c;
      var count=c==='All'?avail.length:avail.filter(function(it){return it.category===c;}).length;
      if(c!=='All' && count===0) return; // Hide empty categories in Log view to reduce clutter
      var badgeBg=active?'rgba(240,217,181,0.25)':'#f0e6d4';
      var badgeColor=active?'#f0d9b5':'#7a5c3a';
      var badge=count>0?'<span style="background:'+badgeBg+';border-radius:10px;padding:1px 7px;margin-left:6px;font-size:11px;font-weight:700;color:'+badgeColor+';">'+count+'</span>':'';
      h+='<button onclick="S.filterCat=\''+c+'\';render();" style="padding:5px 12px;border-radius:20px;white-space:nowrap;font-size:12px;border:'+(active?'none':'1px solid #e8ddd0')+';background:'+(active?'#3d2b1a':'transparent')+';color:'+(active?'#f0d9b5':'#7a5c3a')+';display:inline-flex;align-items:center;">'+c+badge+'</button>';
    });
    h+='</div>';
  }

  if(!avail.length){
    h+='<div style="text-align:center;padding:48px 20px;color:#a08060;"><div style="font-size:40px;margin-bottom:12px;">😅</div>';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:6px;color:#7a5c3a;">No stock available</div>';
    h+='<div style="font-size:13px;">Time to prep!</div></div>';
    return h;
  }

  if(!filtered.length){
    h+='<div style="text-align:center;padding:32px 20px;color:#a08060;">';
    h+='<div style="font-size:14px;">Nothing in '+esc(S.filterCat)+' available.</div>';
    h+='<button onclick="S.filterCat=\'All\';render();" style="margin-top:12px;background:transparent;border:1px solid #c8b89a;color:#7a5c3a;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;">Show all</button>';
    h+='</div>';
    return h;
  }

  filtered.forEach(function(it){
    var fgt=daysSince(it.lastEaten||it.prepDate)>=S.settings.forgottenDays;
    var u=unitOf(it);
    var macrosMeta='';
    if(it.macros&&it.macros.cal){
      macrosMeta=' · '+it.macros.cal+' cal, '+it.macros.protein+'g pro '+(u==='portions'?'per portion':'per 100'+u);
    }
    h+='<button onclick="openLogModal(\''+it.id+'\')" style="background:#fff8f0;border:1px solid '+(fgt?'#9080c0':'#e0d0ba')+';border-radius:12px;padding:14px 16px;width:100%;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
    h+='<div><div style="font-weight:700;font-size:15px;color:#3d2b1a;">'+esc(it.name)+(fgt?' 💤':'')+'</div>';
    h+='<div style="font-size:12px;color:#7a5c3a;margin-top:2px;">'+esc(it.category)+macrosMeta+'</div></div>';
    h+='<div style="background:#3d2b1a;color:#f0d9b5;border-radius:20px;padding:4px 14px;font-size:14px;font-weight:700;flex-shrink:0;">'+it.portions+(u==='portions'?'':u)+'</div>';
    h+='</button>';
  });
  return h;
}

// ── History view
function renderHistory(){
  var today=todayStr(), grouped={};
  S.history.slice(0,100).forEach(function(h){
    var d=h.date?h.date.split('T')[0]:'unknown';
    if(!grouped[d])grouped[d]=[];
    grouped[d].push(h);
  });
  var days=Object.keys(grouped).sort(function(a,b){return b.localeCompare(a);});
  var h='<div style="font-size:22px;font-weight:700;margin-bottom:18px;">Activity History</div>';
  if(!S.history.length){ h+='<div style="text-align:center;padding:40px;color:#a08060;">No activity yet</div>'; return h; }
  days.forEach(function(day){
    var label=day===today?'Today':daysAgo(day+'T12:00:00')||day;
    var dc=0,dp=0,dany=false;
    grouped[day].filter(function(x){return x.type==='eat';}).forEach(function(x){
      var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
      if(it&&it.macros&&it.macros.cal){dc+=parseFloat(it.macros.cal)*x.portions;dp+=parseFloat(it.macros.protein||0)*x.portions;dany=true;}
    });
    h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin:16px 0 4px;">';
    h+='<div style="font-size:11px;font-weight:700;color:#7a5c3a;text-transform:uppercase;letter-spacing:0.8px;">'+label+'</div>';
    if(dany) h+='<div style="font-size:11px;color:#a08060;">'+Math.round(dc)+' cal · '+Math.round(dp)+'g pro</div>';
    h+='</div>';
    h+='<div style="background:#fff8f0;border-radius:12px;border:1px solid #e0d0ba;padding:0 14px;margin-bottom:12px;">';
    grouped[day].forEach(function(x){
      var icon=x.type==='eat'?'🍽':x.type==='waste'?'🗑':x.type==='deleted'?'❌':'🥡';
      var it=S.items.filter(function(z){return z.id===x.itemId;})[0];
      var u=x.unit||(it?unitOf(it):'portions');
      var unitSuffix=u==='portions'?' portion'+(x.portions>1?'s':''):u;
      var meta=x.type==='eat'?'Ate '+x.portions+unitSuffix:x.type==='waste'?'Wasted '+x.portions+unitSuffix:x.type==='deleted'?'Removed from stock':'Prepped '+x.portions+unitSuffix;
      h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #e8ddd0;">';
      h+='<div style="font-size:18px;width:26px;text-align:center;flex-shrink:0;">'+icon+'</div>';
      h+='<div style="flex:1;"><div style="font-size:14px;font-weight:700;">'+esc(x.itemName)+'</div>';
      h+='<div style="font-size:12px;color:#7a5c3a;">'+meta+'</div></div></div>';
    });
    h+='</div>';
  });
  return h;
}

    var confirmLabel=isArch?'Unarchive':'Archive';
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">'+title+'</div>';
    h+='<div style="color:#7a5c3a;font-size:13px;margin-bottom:20px;">'+body+'</div>';
    h+='<div style="display:flex;gap:10px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="confirmArchive(\''+it.id+'\');" style="'+cs.btnPrimary+'flex:1;">'+confirmLabel+'</button>';
    h+='</div></div>';

  } else if(m.type==='edit-history'){
    var entry=m.entry;
    var hIt=S.items.filter(function(x){return x.id===entry.itemId;})[0];
    var hU=entry.unit||(hIt?unitOf(hIt):'portions');
    var hUSfx=hU==='portions'?'':hU;
    var typeLabel=entry.type==='eat'?'eaten':entry.type==='waste'?'wasted':'prepped';
    var titleIcon=entry.type==='eat'?'🍽':entry.type==='waste'?'🗑':'🥡';
    h+='<div style="'+sheet+'">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">'+titleIcon+' Edit: '+esc(entry.itemName)+'</div>';
    h+='<div style="color:#7a5c3a;font-size:13px;margin-bottom:16px;">Amount '+typeLabel+' — adjusts stock to match</div>';
    h+='<label style="'+cs.label+'">Amount</label>';
    h+='<div style="display:flex;align-items:baseline;gap:8px;">';
    h+='<input id="hist-amt" type="number" inputmode="decimal" value="'+entry.portions+'" min="0.1" step="'+(hU==='portions'?'1':'10')+'" oninput="S.histEditAmount=this.value" style="'+cs.input+'flex:1;font-size:20px;font-weight:700;" />';
    if(hUSfx) h+='<span style="font-size:16px;font-weight:700;color:#7a5c3a;">'+hUSfx+'</span>';
    h+='</div>';
    h+='<div style="display:flex;gap:10px;margin-top:20px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="saveHistoryEdit(\''+entry.hid+'\');" style="'+cs.btnPrimary+'flex:1;">Save</button>';
    h+='</div>';
    h+='<button onclick="deleteHistoryEntry(\''+entry.hid+'\');" style="background:transparent;border:1px dashed #b85c38;color:#b85c38;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;margin-top:12px;">Delete entry &amp; restore stock</button>';
    h+='</div>';

  } else if(m.type==='edit'){
    var f=S.editForm;
    var u=f.unit||unitOf(it);
    var macroLbl=u==='portions'?'Macros per portion':'Macros per 100'+u;
    h+='<div style="'+sheet+'max-height:85vh;overflow-y:auto;">';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:14px;">Edit: '+esc(it.name)+'</div>';
    h+='<label style="'+cs.label+'">Name</label><input id="e-name" style="'+cs.input+'" value="'+esc(f.name)+'" />';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    h+='<div><label style="'+cs.label+'">Category</label><select id="e-cat" style="'+cs.input+'">';
    CATS.filter(function(c){return c!=='All';}).forEach(function(c){h+='<option'+(f.category===c?' selected':'')+'>'+c+'</option>';});
    h+='</select></div>';
    h+='<div><label style="'+cs.label+'">Measured in</label><select id="e-unit" onchange="S.editForm.unit=this.value;collectEditForm();render();" style="'+cs.input+'">';
    [['portions','Portions'],['g','Grams (g)'],['ml','Millilitres (ml)']].forEach(function(opt){
      h+='<option value="'+opt[0]+'"'+(u===opt[0]?' selected':'')+'>'+opt[1]+'</option>';
    });
    h+='</select></div>';
    h+='</div>';
    h+='<label style="'+cs.label+'">Expires after (days)</label><input id="e-expiry" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(f.expiryDays)+'" placeholder="e.g. 5" min="1" />';
    h+='<div style="font-size:14px;font-weight:700;margin:16px 0 2px;color:#5a3e2a;">'+macroLbl+'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    [['e-cal','Calories',f.cal],['e-protein','Protein (g)',f.protein],['e-carbs','Carbs (g)',f.carbs],['e-fat','Fat (g)',f.fat]].forEach(function(m){
      h+='<div><label style="'+cs.label+'">'+m[1]+'</label><input id="'+m[0]+'" type="number" inputmode="decimal" style="'+cs.input+'" value="'+esc(m[2])+'" placeholder="0" /></div>';
    });
    h+='</div>';
    h+='<label style="'+cs.label+'">Notes</label><input id="e-notes" style="'+cs.input+'" value="'+esc(f.notes)+'" placeholder="e.g. made with thighs" />';
    h+='<div style="display:flex;gap:10px;margin-top:20px;">';
    h+='<button onclick="S.modal=null;render();" style="'+cs.btnSecondary+'flex:1;">Cancel</button>';
    h+='<button onclick="collectAndSaveEdit();" style="'+cs.btnPrimary+'flex:1;">Save Changes</button>';
    h+='</div>';
    // Archive / Unarchive (infrequent action, tucked under save button)
    var archLabel=isArchived(it)?'📤 Unarchive item':'📁 Archive item';
    var archSub=isArchived(it)?'Restore to your active stock':'Hide from stock and alerts (can be restored later)';
    h+='<button onclick="collectEditForm();openArchiveConfirm(\''+it.id+'\');" style="background:transparent;border:1px dashed #c8b89a;color:#7a5c3a;border-radius:10px;padding:12px;width:100%;font-size:13px;cursor:pointer;margin-top:16px;text-align:left;">';
    h+='<div style="font-weight:700;margin-bottom:2px;">'+archLabel+'</div>';
    h+='<div style="font-size:11px;color:#a08060;">'+archSub+'</div>';
    h+='</button>';
    h+='</div>';
  }

  h+='</div>';
  return h;
}

function macroPreviewHTML(it,n){
  var m=macroFor(it,n);
  if(!m)return '';
  return '<div style="background:#f0e6d4;border-radius:8px;padding:10px 14px;font-size:13px;color:#5a3e2a;">~'+Math.round(m.cal)+' cal · '+Math.round(m.protein)+'g protein · '+Math.round(m.carbs)+'g carbs · '+Math.round(m.fat)+'g fat</div>';
}

function stepperHTML(field,val,step,max,unit,item){
  var suffix=unit&&unit!=='portions'?unit:'';
  var itemRef=item?',\''+item.id+'\'':'';
  return '<div style="display:flex;align-items:center;gap:16px;justify-content:center;">'+
    '<button onclick="stepperNudge(\''+field+'\','+(-step)+','+step+','+max+itemRef+')" style="width:44px;height:44px;border-radius:10px;border:1px solid #c8b89a;background:transparent;font-size:22px;cursor:pointer;flex-shrink:0;">&minus;</button>'+
    '<div style="display:flex;align-items:baseline;">'+
      '<input type="number" inputmode="decimal" value="'+val+'" min="1" max="'+max+'" oninput="onStepperInput(\''+field+'\',this.value,'+max+itemRef+')" style="font-size:28px;font-weight:700;width:80px;text-align:center;border:none;background:transparent;color:#3d2b1a;-webkit-appearance:none;outline:none;padding:0;font-family:inherit;" />'+
      (suffix?'<span style="font-size:18px;font-weight:700;color:#7a5c3a;margin-left:2px;">'+suffix+'</span>':'')+
    '</div>'+
    '<button onclick="stepperNudge(\''+field+'\','+step+','+step+','+max+itemRef+')" style="width:44px;height:44px;border-radius:10px;border:1px solid #c8b89a;background:transparent;font-size:22px;cursor:pointer;flex-shrink:0;">+</button>'+
    '</div>';
}

function stepperNudge(field, delta, step, max, itemId) {
  S[field] = Math.max(step, Math.min(max, S[field] + delta));
  render();
}

function onStepperInput(field, val, max, itemId) {
  var n = parseFloat(val);
  if (isNaN(n) || n < 1) return; // let user keep typing
  S[field] = Math.min(max, n);
  // If we have an item ref and there's a macro preview, update live without full re-render
  if (itemId) {
    var preview = ge('macro-preview');
    if (preview) {
      var it = S.items.filter(function(x){return x.id===itemId;})[0];
      if (it) preview.innerHTML = macroPreviewHTML(it, S[field]);
    }
  }
}

function collectEditForm(){
  if(!S.editForm)return;
  S.editForm.name=ge('e-name')?ge('e-name').value:S.editForm.name;
  S.editForm.category=ge('e-cat')?ge('e-cat').value:S.editForm.category;
  S.editForm.expiryDays=ge('e-expiry')?ge('e-expiry').value:S.editForm.expiryDays;
  S.editForm.cal=ge('e-cal')?ge('e-cal').value:S.editForm.cal;
  S.editForm.protein=ge('e-protein')?ge('e-protein').value:S.editForm.protein;
  S.editForm.carbs=ge('e-carbs')?ge('e-carbs').value:S.editForm.carbs;
  S.editForm.fat=ge('e-fat')?ge('e-fat').value:S.editForm.fat;
  S.editForm.notes=ge('e-notes')?ge('e-notes').value:S.editForm.notes;
}

function collectAndSaveEdit(){
  collectEditForm();
  saveEdit();
}

// ── Init ─────────────────────────────────────────────────────────────────────
localLoad();
S.syncStatus='syncing'; S.syncMsg='Loading\u2026';

fetch(SB_URL+'/rest/v1/prepmacros_data?id=eq.singleton',{
  headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
})
.then(function(res){return res.json();})
.then(function(data){
  if(data&&data.length>0){
    var r=data[0];
    S.items=r.items||[];
    S.history=r.history||[];
    if(r.settings)for(var k in r.settings)S.settings[k]=r.settings[k];
    S.dismissedAlerts=r.dismissed_alerts||{};
    localSave();
    S.syncStatus='synced'; S.syncMsg='Saved to cloud';
  } else {
    S.syncStatus='synced'; S.syncMsg='Ready';
  }
  render();
})
.catch(function(){
  S.syncStatus='error'; S.syncMsg='Offline \u2013 using local data';
  render();
});
</script>
